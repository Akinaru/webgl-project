<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bloom</title>
  </head>
  <body>
    <canvas class="webgl"></canvas>
    <div class="boot" id="bootScreen">
      <div class="boot__home" id="bootHome">
        <h1 class="boot__title">BLOOM</h1>
        <div class="boot__actions">
          <button class="boot__btn" id="btnStartWithAudio" type="button">Lancer le jeu</button>
          <button class="boot__btn boot__btn--ghost" id="btnStartMuted" type="button">Lancer le jeu sans son</button>
        </div>
      </div>

      <div class="boot__loading" id="bootLoading" aria-live="polite">
        <span class="boot__loading-label">Chargement</span>
        <span class="boot__loading-value" id="bootLoadingValue">0%</span>
        <div class="boot__loading-bar">
          <span class="boot__loading-fill" id="bootLoadingFill"></span>
        </div>
      </div>

      <div class="boot__eye" id="bootEye" aria-hidden="true">
        <div class="boot__eyelid boot__eyelid--top"></div>
        <div class="boot__eyelid boot__eyelid--bottom"></div>
      </div>
    </div>
    <div class="hud">
      <p class="hud__hint"></p>
      <div class="hud__crosshair" aria-hidden="true"></div>
    </div>
    <div class="pause-menu" id="pauseMenu" aria-hidden="true">
      <div class="pause-menu__panel" role="dialog" aria-modal="true" aria-labelledby="pauseMenuTitle">
        <p class="pause-menu__subtitle">Menu pause</p>
        <h2 class="pause-menu__title" id="pauseMenuTitle">Jeu en pause</h2>
        <p class="pause-menu__text">Appuie sur Echap ou clique sur reprendre pour continuer.</p>
        <div class="pause-menu__actions">
          <button class="pause-menu__button" id="pauseResumeButton" type="button">Reprendre</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/script.js"></script>
  </body>
</html>
