<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bloom</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas class="webgl"></canvas>
    <div class="boot" id="bootScreen">
      <div class="boot__home" id="bootHome">
        <div class="boot__logo-viewer" id="bootLogoViewer" aria-hidden="true"></div>
        <div class="boot__panel menu-panel" role="dialog" aria-modal="true" aria-labelledby="bootMenuTitle">
          <h1 class="boot__title menu-title" id="bootMenuTitle">Pour une expérience optimale,<br />nous vous recommandons d’activer le son</h1>
          <label class="boot__sound-toggle menu-toggle" for="bootAudioToggle">
            <input class="boot__checkbox menu-checkbox" id="bootAudioToggle" type="checkbox" />
            <span class="boot__checkbox-ui menu-checkbox-ui" aria-hidden="true"></span>
            <span class="boot__sound-label menu-toggle__label">Activer le son</span>
          </label>
          <div class="boot__actions menu-actions">
            <button class="boot__btn menu-button" id="btnStartExperience" type="button">Démarrer l'expérience</button>
          </div>
        </div>
      </div>

      <div class="boot__eye" id="bootEye" aria-hidden="true">
        <div class="boot__eyelid boot__eyelid--top"></div>
        <div class="boot__eyelid boot__eyelid--bottom"></div>
      </div>
    </div>
    <div class="scene-transition" id="sceneTransition" aria-hidden="true">
      <div class="scene-transition__home">
        <div class="scene-transition__panel menu-panel">
          <p class="scene-transition__title menu-title" data-scene-transition-label>Chargement</p>
          <div class="scene-transition__meter">
            <span class="scene-transition__value" data-scene-transition-value>0%</span>
            <div class="scene-transition__bar" aria-hidden="true">
              <span class="scene-transition__fill" data-scene-transition-fill></span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="hud">
      <div class="hud__crosshair" aria-hidden="true"></div>
    </div>
    <div class="pause-menu" id="pauseMenu" aria-hidden="true">
      <div class="pause-menu__panel menu-panel" role="dialog" aria-modal="true" aria-labelledby="pauseMenuTitle">
        <h2 class="pause-menu__title menu-title" id="pauseMenuTitle">Menu principal</h2>
        <div class="pause-menu__actions menu-actions">
          <button class="pause-menu__button menu-button" id="pauseResumeButton" type="button">Reprendre l'expérience</button>
          <button class="pause-menu__button pause-menu__button--secondary menu-button menu-button--secondary" id="pauseSettingsButton" type="button">Paramètres</button>
        </div>
      </div>
      <div class="pause-settings menu-panel" id="pauseSettingsModal" role="dialog" aria-modal="true" aria-labelledby="pauseSettingsTitle" aria-hidden="true">
        <div class="pause-settings__header">
          <h3 class="pause-settings__title" id="pauseSettingsTitle">Paramètres</h3>
          <button class="pause-settings__close" id="pauseSettingsCloseButton" type="button" aria-label="Fermer les paramètres">✕</button>
        </div>
        <div class="pause-settings__section">
          <img class="pause-settings__icon" src="/icons/settings-audio.svg" alt="" aria-hidden="true" />
          <div class="pause-settings__subtitle">Audio</div>
        </div>
        <div class="pause-settings__controls">
          <label class="pause-settings__row" for="pauseMusicVolume">
            <span class="pause-settings__label">Musique</span>
            <input class="pause-settings__slider" id="pauseMusicVolume" type="range" min="0" max="100" step="1" value="100" />
            <span class="pause-settings__value" id="pauseMusicVolumeValue">100%</span>
          </label>
          <label class="pause-settings__row" for="pauseSfxVolume">
            <span class="pause-settings__label">Effets sonores</span>
            <input class="pause-settings__slider" id="pauseSfxVolume" type="range" min="0" max="100" step="1" value="100" />
            <span class="pause-settings__value" id="pauseSfxVolumeValue">100%</span>
          </label>
        </div>
        <div class="pause-settings__section pause-settings__section--gfx">
          <img class="pause-settings__icon" src="/icons/settings-gfx.svg" alt="" aria-hidden="true" />
          <div class="pause-settings__subtitle">Qualité graphique</div>
        </div>
        <div class="pause-settings__gfx-controls" role="group" aria-label="Qualité graphique">
          <button class="pause-settings__gfx-button" type="button" data-gfx-quality="low">Bas</button>
          <button class="pause-settings__gfx-button" type="button" data-gfx-quality="medium">Moyen</button>
          <button class="pause-settings__gfx-button" type="button" data-gfx-quality="high">Élevé</button>
        </div>
        <div class="pause-settings__section pause-settings__section--keyboard">
          <img class="pause-settings__icon" src="/icons/settings-keyboard.svg" alt="" aria-hidden="true" />
          <div class="pause-settings__subtitle">Touches du clavier</div>
        </div>
        <ul class="pause-settings__keybinds" aria-label="Raccourcis clavier">
          <li class="pause-settings__keybind-row">
            <span class="pause-settings__keybind-label">Avancer</span>
            <button class="pause-settings__keybind-button" type="button" data-keybind-action="moveForward">W</button>
          </li>
          <li class="pause-settings__keybind-row">
            <span class="pause-settings__keybind-label">Gauche</span>
            <button class="pause-settings__keybind-button" type="button" data-keybind-action="moveLeft">A</button>
          </li>
          <li class="pause-settings__keybind-row">
            <span class="pause-settings__keybind-label">Sauter</span>
            <button class="pause-settings__keybind-button" type="button" data-keybind-action="jump">Espace</button>
          </li>
          <li class="pause-settings__keybind-row">
            <span class="pause-settings__keybind-label">Reculer</span>
            <button class="pause-settings__keybind-button" type="button" data-keybind-action="moveBackward">S</button>
          </li>
          <li class="pause-settings__keybind-row">
            <span class="pause-settings__keybind-label">Droite</span>
            <button class="pause-settings__keybind-button" type="button" data-keybind-action="moveRight">D</button>
          </li>
          <li class="pause-settings__keybind-row">
            <span class="pause-settings__keybind-label">Pause</span>
            <button class="pause-settings__keybind-button" type="button" data-keybind-action="pause">Echap</button>
          </li>
        </ul>
        <div class="pause-settings__reset-wrap">
          <button class="pause-settings__reset-button" id="pauseSettingsResetAll" type="button">Réinitialiser</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/script.js"></script>
  </body>
</html>
