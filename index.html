<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bloom</title>
  </head>
  <body>
    <canvas class="webgl"></canvas>
    <div class="boot" id="bootScreen">
      <div class="boot__home" id="bootHome">
        <div class="boot__panel" role="dialog" aria-modal="true" aria-labelledby="bootMenuTitle">
          <h1 class="boot__title" id="bootMenuTitle">Pour une expérience optimale,<br />nous vous recommandons d’activer le son</h1>
          <label class="boot__sound-toggle" for="bootAudioToggle">
            <input class="boot__checkbox" id="bootAudioToggle" type="checkbox" />
            <span class="boot__checkbox-ui" aria-hidden="true"></span>
            <span class="boot__sound-label">Activer le son</span>
          </label>
          <div class="boot__actions">
            <button class="boot__btn" id="btnStartExperience" type="button">Démarrer l'expérience</button>
          </div>
        </div>
      </div>

      <div class="boot__eye" id="bootEye" aria-hidden="true">
        <div class="boot__eyelid boot__eyelid--top"></div>
        <div class="boot__eyelid boot__eyelid--bottom"></div>
      </div>
    </div>
    <div class="hud">
      <p class="hud__hint"></p>
      <div class="hud__crosshair" aria-hidden="true"></div>
    </div>
    <div class="pause-menu" id="pauseMenu" aria-hidden="true">
      <div class="pause-menu__panel" role="dialog" aria-modal="true" aria-labelledby="pauseMenuTitle">
        <h2 class="pause-menu__title" id="pauseMenuTitle">Menu principal</h2>
        <div class="pause-menu__actions">
          <button class="pause-menu__button" id="pauseResumeButton" type="button">Reprendre l'expérience</button>
          <button class="pause-menu__button pause-menu__button--secondary" id="pauseSettingsButton" type="button">Paramètres</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/script.js"></script>
  </body>
</html>
