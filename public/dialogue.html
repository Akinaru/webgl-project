      function createField({ label, element, help = '' }) {
        const wrapper = document.createElement('div')
        wrapper.className = 'field'
        const title = document.createElement('label')
        title.textContent = label
        wrapper.appendChild(title)
        wrapper.appendChild(element)
        if(help) {
          const hint = document.createElement('div')
          hint.className = 'field-help'
          hint.textContent = help
          wrapper.appendChild(hint)
        }
        return wrapper
      }

      function createEditorSection({ title, help = '', tone = 'slate' }) {
        const section = document.createElement('section')
        section.className = `editor-section ${tone}`

        const heading = document.createElement('h3')
        heading.className = 'editor-section__title'
        heading.textContent = title
        section.appendChild(heading)

        if(help) {
          const hint = document.createElement('p')
          hint.className = 'editor-section__help'
          hint.textContent = help
          section.appendChild(hint)
        }

        return section
      }

      function getInspectorObjectKey(object, prefix = 'item') {
        if(!object || typeof object !== 'object') {
          return `${prefix}.none`
        }
        if(!inspectorObjectKeys.has(object)) {
          inspectorObjectKeys.set(object, `${prefix}.${inspectorObjectKeyCounter++}`)
        }
        return inspectorObjectKeys.get(object)
      }

      function inspectorDetailsStateKey(localKey) {
        return `${currentDialogueKey || 'none'}::${selectedNodeId || 'none'}::${localKey}`
      }

      function createPersistentDetails(localKey, { className = 'item', defaultOpen = false } = {}) {
        const details = document.createElement('details')
        details.className = className

        const key = inspectorDetailsStateKey(localKey)
        if(state.ui.inspectorDetailsOpen[key] === undefined) {
          details.open = defaultOpen
        } else {
          details.open = Boolean(state.ui.inspectorDetailsOpen[key])
        }

        details.addEventListener('toggle', () => {
          state.ui.inspectorDetailsOpen[key] = details.open
        })

        return details
      }

      function previewText(value, maxLength = 40) {
        const text = String(value ?? '').trim()
        if(text === '') {
          return '(vide)'
        }
        if(text.length <= maxLength) {
          return text
        }
        return `${text.slice(0, maxLength - 1)}…`
      }

      function createNodeSelect(currentValue, onChange) {
        const select = document.createElement('select')
        select.className = 'control'
        const dialogue = currentDialogue()

        const blank = document.createElement('option')
        blank.value = ''
        blank.textContent = '-- Aucun --'
        select.appendChild(blank)

        Object.keys(dialogue.nodes).forEach((nodeId) => {
          const option = document.createElement('option')
          option.value = nodeId
          option.textContent = nodeId
          select.appendChild(option)
        })

        select.value = currentValue || ''
        select.addEventListener('change', () => {
          onChange(select.value || '')
        })

        return select
      }

      function renderDialogueList() {
        refs.dialogueList.innerHTML = ''

        const keys = Object.keys(state.dialogues).sort()
        if(keys.length === 0) {
          refs.dialogueList.innerHTML = '<div class="empty">Aucun dialogue.</div>'
          return
        }

        keys.forEach((key) => {
          const item = document.createElement('button')
          item.type = 'button'
          item.className = `dialogue-item ${key === currentDialogueKey ? 'active' : ''}`

          const dialogue = state.dialogues[key]
          const count = Object.keys(dialogue.nodes || {}).length
          item.innerHTML = `
            <strong>${key}</strong><br />
            <span class="muted">${count} bloc(s) - debut: ${dialogue.startNode || 'non defini'}</span>
          `
          item.addEventListener('click', () => selectDialogue(key))
          refs.dialogueList.appendChild(item)
        })
      }

      function renderDialogueMeta() {
        const dialogue = currentDialogue()
        const root = refs.dialogueMetaSection
        root.innerHTML = '<h2>Configuration du dialogue</h2>'

        if(!dialogue) {
          const empty = document.createElement('div')
          empty.className = 'empty'
          empty.textContent = 'Selectionne un dialogue a gauche pour voir ses reglages.'
          root.appendChild(empty)
          return
        }

        const keyInput = document.createElement('input')
        keyInput.value = currentDialogueKey
        keyInput.addEventListener('blur', () => renameDialogue(currentDialogueKey, keyInput.value))
        root.appendChild(createField({
          label: 'Nom unique du dialogue',
          element: keyInput,
          help: 'Identifiant interne. Exemple: bloom.intro'
        }))

        const onceSelect = document.createElement('select')
        onceSelect.innerHTML = '<option value="false">Non, ce dialogue peut se rejouer</option><option value="true">Oui, ce dialogue ne se joue qu une fois</option>'
        onceSelect.value = String(Boolean(dialogue.once))
        onceSelect.addEventListener('change', () => {
          dialogue.once = onceSelect.value === 'true'
        })
        root.appendChild(createField({
          label: 'Ce dialogue ne se joue qu une seule fois ?',
          element: onceSelect,
          help: 'Active cette option pour bloquer le dialogue apres la premiere lecture.'
        }))

        const startSelect = createNodeSelect(dialogue.startNode, (value) => {
          dialogue.startNode = value
          syncGraphFromDialogue()
          renderDialogueList()
        })
        root.appendChild(createField({
          label: 'Bloc de demarrage du dialogue',
          element: startSelect,
          help: 'Ce bloc sera lu en premier quand le dialogue est lance.'
        }))

        const dangerRow = document.createElement('div')
        dangerRow.className = 'row-actions'
        dangerRow.style.marginTop = '8px'

        const deleteDialogue = document.createElement('button')
        deleteDialogue.className = 'btn tiny tone-red'
        setButtonVisual(deleteDialogue, { label: 'Supprimer dialogue', icon: 'trash', tone: 'red' })
        deleteDialogue.addEventListener('click', async () => {
          const confirmed = await showConfirmModal({
            title: 'Supprimer ce dialogue',
            message: `Le dialogue ${currentDialogueKey} sera supprime de l editeur.`,
            confirmLabel: 'Supprimer',
            cancelLabel: 'Annuler',
            tone: 'red'
          })
          if(!confirmed) {
            return
          }
          delete state.dialogues[currentDialogueKey]
          delete state.layouts[currentDialogueKey]
          currentDialogueKey = null
          selectedNodeId = null
          clearLinkArming()
          hideQuickPalette()
          state.ui.rightPanelVisible = false
          updateLayoutVisibility()
          renderDialogueList()
          renderDialogueMeta()
          renderNodeInspector()
          syncGraphFromDialogue()
        })
        dangerRow.appendChild(deleteDialogue)
        root.appendChild(dangerRow)
      }

      function renderNodeInspector() {
        const dialogue = currentDialogue()
        const root = refs.nodeInspectorSection
        root.innerHTML = ''

        const heading = document.createElement('h2')
        heading.textContent = selectedNodeId || 'Bloc'
        root.appendChild(heading)

        if(!dialogue || !selectedNodeId || !dialogue.nodes[selectedNodeId]) {
          const empty = document.createElement('div')
          empty.className = 'empty'
          empty.textContent = 'Selectionne un bloc dans le graphe.'
          root.appendChild(empty)
          updateDockState()
          return
        }

        const node = dialogue.nodes[selectedNodeId]
        const inspectorNodeId = selectedNodeId
        const inspectorHead = document.createElement('div')
        inspectorHead.className = 'inspector-head'
        const infoPill = document.createElement('div')
        infoPill.className = 'pill'
        infoPill.textContent = NODE_TYPE_LABELS[node.type] || node.type
        inspectorHead.appendChild(infoPill)
        root.appendChild(inspectorHead)

        const typeSelect = document.createElement('select')
        ;['line', 'choice', 'branch', 'action', 'end'].forEach((type) => {
          const option = document.createElement('option')
          option.value = type
          option.textContent = NODE_TYPE_LABELS[type] || type
          typeSelect.appendChild(option)
        })
        typeSelect.value = node.type || 'line'
        typeSelect.addEventListener('change', () => {
          const nextType = typeSelect.value
          const base = createNode(nextType)
          dialogue.nodes[selectedNodeId] = {
            ...base,
            speaker: node.speaker ?? base.speaker,
            text: node.text ?? base.text,
            next: node.next ?? base.next
          }
          renderNodeInspector()
          syncGraphFromDialogue()
        })
        root.appendChild(createField({
          label: 'Role du bloc',
          element: typeSelect,
          help: 'Definit ce que fait ce bloc.'
        }))

        const idInput = document.createElement('input')
        idInput.value = selectedNodeId
        idInput.addEventListener('blur', () => {
          const ok = renameNode(selectedNodeId, idInput.value)
          if(ok) {
            renderDialogueList()
            renderDialogueMeta()
            renderNodeInspector()
            syncGraphFromDialogue()
          }
        })
        root.appendChild(createField({
          label: 'Nom technique unique du bloc',
          element: idInput,
          help: 'Utilise un nom court et unique.'
        }))

        if(node.type === 'line') {
          renderLineEditor(root, node)
        } else if(node.type === 'choice') {
          renderChoiceEditor(root, node)
        } else if(node.type === 'branch') {
          renderBranchEditor(root, node)
        } else if(node.type === 'action') {
          renderActionEditor(root, node)
        } else if(node.type === 'end') {
          renderEndEditor(root, node)
        }

        const dangerRow = document.createElement('div')
        dangerRow.className = 'row-actions'
        const deleteNodeBtn = document.createElement('button')
        deleteNodeBtn.type = 'button'
        deleteNodeBtn.className = 'btn tiny tone-red'
        setButtonVisual(deleteNodeBtn, { label: 'Supprimer bloc', icon: 'trash', tone: 'red' })
        deleteNodeBtn.addEventListener('click', async (event) => {
          event.preventDefault()
          const confirmed = await showConfirmModal({
            title: 'Supprimer ce bloc',
            message: `Le bloc ${inspectorNodeId} sera supprime, et ses references seront nettoyees.`,
            confirmLabel: 'Supprimer',
            cancelLabel: 'Annuler',
            tone: 'red'
          })
          if(confirmed) {
            deleteNodeById(inspectorNodeId)
          }
        })
        dangerRow.appendChild(deleteNodeBtn)
        root.appendChild(dangerRow)
        updateDockState()
      }

      function renderLineEditor(root, node) {
        const contentSection = createEditorSection({
          title: '1. Contenu du message',
          help: '',
          tone: 'blue'
        })

        const speaker = document.createElement('input')
        speaker.className = 'control'
        speaker.value = node.speaker || ''
        speaker.addEventListener('input', () => {
          node.speaker = speaker.value
        })
        contentSection.appendChild(createField({
          label: 'Personnage qui parle',
          element: speaker,
          help: 'Exemple: Bloom, Narrateur, Joueur'
        }))

        const text = document.createElement('textarea')
        text.className = 'control'
        text.value = node.text || ''
        text.addEventListener('input', () => {
          node.text = text.value
        })
        contentSection.appendChild(createField({
          label: 'Texte affiche au joueur',
          element: text
        }))
        root.appendChild(contentSection)

        const navSection = createEditorSection({
          title: '2. Suite du dialogue',
          help: '',
          tone: 'amber'
        })

        const next = createNodeSelect(node.next, (value) => {
          node.next = value
          syncGraphFromDialogue()
        })
        navSection.appendChild(createField({
          label: 'Bloc suivant apres ce texte',
          element: next
        }))
        root.appendChild(navSection)

        const actionSection = createEditorSection({
          title: '3. Actions optionnelles',
          help: '',
          tone: 'green'
        })

        appendActionListEditor(actionSection, {
          title: 'Actions declenchees dans ce bloc',
          help: 'Optionnel. Declenche des effets au moment ou cette ligne s affiche.',
          actions: node.actions || [],
          onUpdate: (nextActions) => {
            node.actions = nextActions
          }
        })
        root.appendChild(actionSection)
      }

      function renderChoiceEditor(root, node) {
        const questionSection = createEditorSection({
          title: '1. Question affichee',
          help: '',
          tone: 'blue'
        })

        const speaker = document.createElement('input')
        speaker.className = 'control'
        speaker.value = node.speaker || ''
        speaker.addEventListener('input', () => {
          node.speaker = speaker.value
        })
        questionSection.appendChild(createField({
          label: 'Personnage qui pose la question',
          element: speaker
        }))

        const text = document.createElement('textarea')
        text.className = 'control'
        text.value = node.text || ''
        text.addEventListener('input', () => {
          node.text = text.value
        })
        questionSection.appendChild(createField({
          label: 'Question affichee au joueur',
          element: text
        }))
        root.appendChild(questionSection)

        if(!Array.isArray(node.choices)) {
          node.choices = []
        }

        const answersSection = createEditorSection({
          title: '2. Reponses du joueur',
          help: '',
          tone: 'red'
        })
        const flowHint = document.createElement('div')
        flowHint.className = 'field-help'
        flowHint.textContent = 'Actions et logique avancee: utilise des blocs "action" et "branch" relies apres ce choix.'
        answersSection.appendChild(flowHint)

        if(node.choices.length > 0) {
          const overview = document.createElement('div')
          overview.className = 'choice-overview'
          node.choices.forEach((choice, index) => {
            const row = document.createElement('div')
            row.className = 'choice-overview__row'
            row.innerHTML = `
              <span class="choice-overview__idx">${index + 1}</span>
              <span>${previewText(choice.text, 52)}</span>
              <span class="choice-overview__to">→ ${choice.next || 'non defini'}</span>
            `
            overview.appendChild(row)
          })
          answersSection.appendChild(overview)
        }

        if(node.choices.length === 0) {
          const empty = document.createElement('div')
          empty.className = 'empty'
          empty.textContent = 'Aucune reponse pour le moment.'
          answersSection.appendChild(empty)
        }

        node.choices.forEach((choice, index) => {
          if(!choice.id) {
            choice.id = `choice_${index + 1}`
          }

          const choiceKey = getInspectorObjectKey(choice, 'choice')
          const item = createPersistentDetails(`choice.item.${choiceKey}`, {
            className: 'item',
            defaultOpen: index === 0
          })
          const summary = document.createElement('summary')
          const nextLabel = choice.next && currentDialogue()?.nodes?.[choice.next] ? choice.next : 'non defini'
          summary.innerHTML = `
            <span>Reponse ${index + 1}: ${previewText(choice.text, 46)}</span>
            <span class="summary-meta">→ ${nextLabel}</span>
          `
          item.appendChild(summary)

          const ctext = document.createElement('textarea')
          ctext.className = 'control'
          ctext.value = choice.text || ''
          ctext.addEventListener('input', () => {
            choice.text = ctext.value
          })
          item.appendChild(createField({
            label: 'Texte',
            element: ctext
          }))

          const next = createNodeSelect(choice.next, (value) => {
            choice.next = value
            syncGraphFromDialogue()
            renderNodeInspector()
          })
          item.appendChild(createField({
            label: 'Bloc cible',
            element: next
          }))

          const del = document.createElement('button')
          del.className = 'btn tiny tone-red'
          setButtonVisual(del, { label: 'Supprimer cette reponse', icon: 'trash', tone: 'red' })
          del.addEventListener('click', () => {
            node.choices.splice(index, 1)
            renderNodeInspector()
            syncGraphFromDialogue()
          })
          item.appendChild(del)

          answersSection.appendChild(item)
        })

        const add = document.createElement('button')
        add.className = 'btn tiny tone-green'
        setButtonVisual(add, { label: 'Ajouter une reponse joueur', icon: 'plus', tone: 'green' })
        add.addEventListener('click', () => {
          node.choices.push({
            id: `choice_${node.choices.length + 1}`,
            text: '',
            next: ''
          })
          renderNodeInspector()
        })
        answersSection.appendChild(add)
        root.appendChild(answersSection)
      }

      function renderBranchEditor(root, node) {
        if(!Array.isArray(node.branches)) {
          node.branches = []
        }

        const rulesSection = createEditorSection({
          title: '1. Regles de decision',
          help: '',
          tone: 'amber'
        })

        if(node.branches.length === 0) {
          const empty = document.createElement('div')
          empty.className = 'empty'
          empty.textContent = 'Aucune regle pour le moment.'
          rulesSection.appendChild(empty)
        }

        node.branches.forEach((branch, index) => {
          const branchKey = getInspectorObjectKey(branch, 'branch')
          const item = createPersistentDetails(`branch.item.${branchKey}`, {
            className: 'item',
            defaultOpen: index === 0
          })
          const summary = document.createElement('summary')
          const nextLabel = branch.next && currentDialogue()?.nodes?.[branch.next] ? branch.next : 'non defini'
          summary.innerHTML = `
            <span>Regle ${index + 1}</span>
            <span class="summary-meta">→ ${nextLabel}</span>
          `
          item.appendChild(summary)

          const next = createNodeSelect(branch.next, (value) => {
            branch.next = value
            syncGraphFromDialogue()
            renderNodeInspector()
          })
          item.appendChild(createField({
            label: 'Aller vers ce bloc si la regle est valide',
            element: next
          }))

          appendConditionListEditor(item, {
            title: 'Conditions',
            conditions: branch.conditions || [],
            onUpdate: (nextConditions) => {
              branch.conditions = nextConditions

          const del = document.createElement('button')
          del.className = 'btn tiny tone-red'
          setButtonVisual(del, { label: 'Supprimer cette regle', icon: 'trash', tone: 'red' })
          del.addEventListener('click', () => {
            node.branches.splice(index, 1)
            renderNodeInspector()
            syncGraphFromDialogue()
          })
          item.appendChild(del)

          rulesSection.appendChild(item)
        })

        const add = document.createElement('button')
        add.className = 'btn tiny tone-green'
        setButtonVisual(add, { label: 'Ajouter une regle', icon: 'plus', tone: 'green' })
        add.addEventListener('click', () => {
          node.branches.push({

            next: ''

          renderNodeInspector()

        const fallbackSection = createEditorSection({
          title: '2. Chemin par defaut',
          help: '',
          tone: 'slate'

        const fallback = createNodeSelect(node.fallbackNext, (value) => {
          node.fallbackNext = value
          syncGraphFromDialogue()
        })
        fallbackSection.appendChild(createField({
          label: 'Si aucune regle ne passe, aller vers ce bloc',
          element: fallback
        }))
        root.appendChild(fallbackSection)

      }

      function renderEndEditor(root, node) {
        const section = createEditorSection({
          title: 'Actions de fin',
          help: '',
          tone: 'slate'
        })

        appendActionListEditor(section, {
          title: 'Actions de fin de dialogue',
          actions: node.actions || [],
          onUpdate: (nextActions) => {
            node.actions = nextActions
          }
        })
        root.appendChild(section)
      }

      function edgeId(from, to, label) {
        return `${from}__${to}__${label}`
      }

      function syncGraphFromDialogue() {
        const dialogue = currentDialogue()
        nodesDS.clear()
        edgesDS.clear()
        hideNodeHoverTooltip()

        if(!dialogue) {
          refs.kpiNodes.textContent = '0'
          refs.kpiEdges.textContent = '0'
          hideQuickPalette()
          clearLinkArming()
          return
        }

        ensureLayoutForCurrentDialogue()
        const layout = currentLayout()

        const nodeIds = Object.keys(dialogue.nodes)
        nodeIds.forEach((id) => {
          const node = dialogue.nodes[id]
          const isStart = dialogue.startNode === id
          const color = TYPE_COLORS[node.type] || '#111'
          const position = layout[id] || { x: 0, y: 0 }
          nodesDS.add({
            id,
            label: `${isStart ? '★ ' : ''}${id}\n${NODE_TYPE_LABELS[node.type] || node.type}`,
            shape: 'box',
            font: { color: '#111', face: 'Manrope, Segoe UI, sans-serif', size: 14 },
            color: {
              background: '#fff',
              border: color,
              highlight: { background: '#f4f4f4', border: '#111' }
            },
            borderWidth: isStart ? 3 : 2,
            x: position.x,
            y: position.y
          })
        })

        const rawEdges = []
        const pushEdge = (from, to, label, color = '#111') => {
          if(!from || !to || !dialogue.nodes[from] || !dialogue.nodes[to]) {
            return
          }
          rawEdges.push({
            id: edgeId(from, to, label),
            from,
            to,
            label,
            color
          })
        }

        for(const [from, node] of Object.entries(dialogue.nodes)) {
          if(node.next) {
            pushEdge(from, node.next, 'suivant', '#0057ff')
          }
          if(Array.isArray(node.choices)) {
            node.choices.forEach((choice) => {
              if(choice.next) {
                pushEdge(from, choice.next, `reponse:${choice.id || '?'}`, '#d41c1c')
              }
            })
          }
          if(Array.isArray(node.branches)) {
            node.branches.forEach((branch, index) => {
              if(branch.next) {
                pushEdge(from, branch.next, `si#${index + 1}`, '#f5b400')
              }
            })
          }
          if(node.fallbackNext) {
            pushEdge(from, node.fallbackNext, 'sinon', '#111')
          }
        }

        const buckets = {}
        rawEdges.forEach((edge) => {
          const key = `${edge.from}__${edge.to}`
          if(!buckets[key]) {
            buckets[key] = []
          }
          buckets[key].push(edge)
        })

        Object.values(buckets).forEach((bucket) => {
          const total = bucket.length
          bucket.forEach((edge, index) => {
            let smooth
            if(total === 1) {
              smooth = { enabled: true, type: 'cubicBezier', roundness: 0.26 }
            } else {
              const center = (total - 1) / 2
              const offset = index - center
              const direction = offset >= 0 ? 'curvedCW' : 'curvedCCW'
              const roundness = Math.min(0.72, 0.2 + Math.abs(offset) * 0.16)
              smooth = { enabled: true, type: direction, roundness }
            }

            edgesDS.update({
              ...edge,
              arrows: 'to',
              smooth,
              color: edge.color,
              font: { color: '#111', size: 11, face: 'Manrope, Segoe UI, sans-serif', strokeWidth: 0 }
            })
          })
        })

        refs.kpiNodes.textContent = String(nodesDS.length)
        refs.kpiEdges.textContent = String(edgesDS.length)

        if(selectedNodeId && dialogue.nodes[selectedNodeId]) {
          network.selectNodes([selectedNodeId])
        }

        updateDockState()
      }

      function exportJson() {
        const payload = {
          dialogues: deepClone(state.dialogues)
        }
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = 'dialogues.export.json'
        document.body.appendChild(a)
        a.click()
        a.remove()
        URL.revokeObjectURL(url)
        setStatus('Export JSON termine.', 'ok')
      }

      async function fetchJsonNoCache(path) {
        const url = `${path}${path.includes('?') ? '&' : '?'}_ts=${Date.now()}`
        const response = await fetch(url, { cache: 'no-store' })
        if(!response.ok) {
          throw new Error(`HTTP ${response.status}`)
        }
        return response.json()
      }

      async function loadDefaultFile({ silent = false } = {}) {
        try {
          let json = null
          let lastError = null
          let loadedPath = null

          for(const path of PROJECT_DIALOGUES_CANDIDATE_PATHS) {
            try {
              json = await fetchJsonNoCache(path)
              loadedPath = path
              break
            } catch(error) {
              lastError = error
            }
          }

          if(!json) {
            throw lastError || new Error('Fichier introuvable')
          }

          applyDialoguesState(json, {
            sourceLabel: `Projet (${loadedPath || 'fichier'})`
          })

          if(!silent) {
            setStatus(`Dialogues projet charges depuis ${loadedPath}.`, 'ok')
          }
          return true
        } catch(error) {
          if(!silent) {
            setStatus(`Impossible de charger le fichier projet (${error.message}).`, 'warn')
          }
          return false
        }
      }

      function importFromFile(file) {
        const reader = new FileReader()
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || '{}'))
            applyDialoguesState(parsed, {
              sourceLabel: `Import (${file.name})`
            })
            setStatus(`Import reussi: ${file.name}`, 'ok')
          } catch(error) {
            setStatus(`Import invalide (${error.message})`, 'warn')
          }
        }
        reader.readAsText(file)
      }

      function setupNetwork() {
        network = new vis.Network(
          document.getElementById('graph'),
          { nodes: nodesDS, edges: edgesDS },
          {
            physics: false,
            interaction: {
              hover: true,
              multiselect: false
            },
            layout: {
              improvedLayout: false
            },
            nodes: {
              shape: 'box',
              margin: 10
            },
            edges: {
              arrows: { to: { enabled: true, scaleFactor: 0.75 } }
            }
          }
        )

        network.on('click', (params) => {
          hideNodeHoverTooltip()
          const clickedNodeId = params.nodes[0]
          const rawEvent = params.event?.srcEvent
          const shouldArmByAlt = Boolean(rawEvent?.altKey)

          if(clickedNodeId) {
            hideQuickPalette()

            if(state.ui.linkSourceId) {
              if(state.ui.linkSourceId === clickedNodeId) {
                setStatus('Choisis un bloc cible different du bloc source.', 'warn')
                return
              }

              const sourceId = state.ui.linkSourceId
              clearLinkArming()

              if(connectNodes(sourceId, clickedNodeId)) {
                selectedNodeId = sourceId
                renderNodeInspector()
                syncGraphFromDialogue()
              }
              return
            }

            if(shouldArmByAlt) {
              state.ui.linkSourceId = clickedNodeId
              selectedNodeId = clickedNodeId
              renderNodeInspector()
              updateDockState()
              setStatus(`Source de liaison definie: ${clickedNodeId}. Clique ensuite un bloc cible.`, 'ok')
              return
            }

            selectedNodeId = clickedNodeId
            renderNodeInspector()
            return
          }

          if(state.ui.linkSourceId) {
            clearLinkArming()
            setStatus('Liaison annulee.', 'warn')
          }

          selectedNodeId = null
          hideQuickPalette()
          renderNodeInspector()
        })

        network.on('doubleClick', (params) => {
          hideNodeHoverTooltip()
          if(params.nodes.length > 0) {
            selectedNodeId = params.nodes[0]
            hideQuickPalette()
            renderNodeInspector()
            return
          }
          if(currentDialogueKey) {
            showQuickPalette(params.pointer?.canvas || getViewportCenter())
          }
        })

        network.on('dragEnd', (params) => {
          if(!currentDialogueKey || !params.nodes || params.nodes.length === 0) {
            return
          }

          const positions = network.getPositions(params.nodes)
          const layout = currentLayout()
          params.nodes.forEach((id) => {
            if(positions[id]) {
              layout[id] = {
                x: positions[id].x,
                y: positions[id].y
              }
            }
          })
        })

        network.on('hoverNode', (params) => {
          showNodeHoverTooltip(params.node)
        })

        network.on('blurNode', () => {
          hideNodeHoverTooltip()
        })

        network.on('dragStart', () => {
          hideNodeHoverTooltip()
        })

        network.on('zoom', () => {
          hideNodeHoverTooltip()
        })
      }

      function setupEvents() {
        refs.appModalBackdrop.addEventListener('click', () => closeAppModal({ confirmed: false }))
        refs.appModalCancel.addEventListener('click', () => closeAppModal({ confirmed: false }))
        refs.appModalConfirm.addEventListener('click', () => closeAppModal({ confirmed: true }))
        refs.appModalInput.addEventListener('keydown', (event) => {
          if(event.key === 'Enter') {
            event.preventDefault()
            closeAppModal({ confirmed: true })
          }
        })

        refs.btnLoadDefault.addEventListener('click', loadDefaultFile)

        refs.btnImport.addEventListener('click', () => refs.fileInput.click())
        refs.fileInput.addEventListener('change', () => {
          const file = refs.fileInput.files?.[0]
          if(file) {
            importFromFile(file)
          }
          refs.fileInput.value = ''
        })

        refs.btnRestoreLocal.addEventListener('click', () => {
          const ok = loadLocalSessionIntoEditor()
          if(!ok) {
            setStatus('Aucune sauvegarde locale disponible.', 'warn')
          }
        })

        refs.btnCloseFile.addEventListener('click', async () => {
          const confirmed = await showConfirmModal({
            title: 'Fermer le fichier courant',
            message: 'Le contenu sera retire de l editeur. La sauvegarde locale est conservee.',
            confirmLabel: 'Fermer',
            cancelLabel: 'Annuler',
            tone: 'slate'
          })
          if(!confirmed) {
            return
          }

          state.dialogues = {}
          state.layouts = {}
          setActiveSourceLabel('Aucune source')
          resetEditorPanelsAndGraph()
          setStatus('Fichier ferme. Tu peux reouvrir le projet ou une sauvegarde locale.', 'ok')
        })

        refs.btnClearLocal.addEventListener('click', async () => {
          const confirmed = await showConfirmModal({
            title: 'Effacer la sauvegarde locale',
            message: 'Cette action supprime la reprise automatique au prochain chargement.',
            confirmLabel: 'Effacer',
            cancelLabel: 'Annuler',
            tone: 'red'
          })
          if(!confirmed) {
            return
          }
          clearLocalSession()
        })

        refs.btnNewDialogue.addEventListener('click', async () => {
          const key = await showPromptModal({
            title: 'Nouveau dialogue',
            message: 'Renseigne une cle interne unique (ex: bloom.new).',
            confirmLabel: 'Creer',
            cancelLabel: 'Annuler',
            tone: 'blue',
            inputLabel: 'Cle du dialogue',
            inputValue: 'bloom.new',
            inputPlaceholder: 'ex: bloom.new'
          })

          if(key === null) {
            return
          }

          const normalized = key.trim()
          if(!normalized) {
            setStatus('Creation annulee: cle vide.', 'warn')
            return
          }

          createDialogue(normalized)
        })

        refs.btnToggleLeft.addEventListener('click', () => {
          state.ui.leftPanelOpen = !state.ui.leftPanelOpen
          updateLayoutVisibility()
        })

        refs.btnExport.addEventListener('click', exportJson)

        refs.dockAddLine.addEventListener('click', () => addNode('line'))
        refs.dockAddChoice.addEventListener('click', () => addNode('choice'))
        refs.dockAddBranch.addEventListener('click', () => addNode('branch'))
        refs.dockAddAction.addEventListener('click', () => addNode('action'))
        refs.dockAddEnd.addEventListener('click', () => addNode('end'))

        refs.quickPalette.querySelectorAll('[data-add-type]').forEach((button) => {
          button.addEventListener('click', () => {
            const type = button.dataset.addType
            addNode(type, { canvasPos: state.ui.quickPaletteCanvasPos || getViewportCenter() })
          })
        })

        refs.dockStartLink.addEventListener('click', () => {
          if(state.ui.linkSourceId) {
            clearLinkArming()
            setStatus('Liaison annulee.', 'warn')
            return
          }
          armLinkFromSelection()
        })

        refs.dockAutoLayout.addEventListener('click', () => {
          autoLayoutCurrentDialogue({ fit: true })
          setStatus('Reorganisation automatique appliquee.', 'ok')
        })

        refs.dockFitView.addEventListener('click', () => {
          network.fit({ animation: { duration: 280, easingFunction: 'easeInOutQuad' } })
          setStatus('Canvas recadre.', 'ok')
        })

        document.addEventListener('keydown', (event) => {
          if(isModalVisible()) {
            if(event.key === 'Escape') {
              event.preventDefault()
              closeAppModal({ confirmed: false })
            }
            return
          }

          const activeTag = document.activeElement?.tagName || ''
          const inTextField = ['INPUT', 'TEXTAREA', 'SELECT'].includes(activeTag) || Boolean(document.activeElement?.isContentEditable)

          if(event.key === 'Escape') {
            hideQuickPalette()
            if(state.ui.linkSourceId) {
              clearLinkArming()
              setStatus('Liaison annulee.', 'warn')
            }
            return
          }

          if(inTextField) {
            return
          }

          if(event.key.toLowerCase() === 'l') {
            event.preventDefault()
            if(state.ui.linkSourceId) {
              clearLinkArming()
              setStatus('Liaison annulee.', 'warn')
            } else {
              armLinkFromSelection()
            }
          }

          if(event.key.toLowerCase() === 'n') {
            event.preventDefault()
            showQuickPalette(getViewportCenter())
          }
        })

        document.addEventListener('pointerdown', (event) => {
          if(!refs.quickPalette.classList.contains('visible')) {
            return
          }
          if(refs.quickPalette.contains(event.target)) {
            return
          }
          hideQuickPalette()
        })
      }

      async function bootstrap() {
        setupNetwork()
        setupEvents()
        decorateStaticButtons()
        setActiveSourceLabel('Aucune source')
        startLocalSessionAutoPersist()

        const restoredLocalSession = loadLocalSessionIntoEditor({ silent: true })
        if(restoredLocalSession) {
          setStatus('Sauvegarde locale restauree automatiquement.', 'ok')
          return
        }

        const loadedFromProject = await loadDefaultFile({ silent: true })
        if(loadedFromProject) {
          setStatus('Dialogues projet charges.', 'ok')
          return
        }

        updateLayoutVisibility()
        updateDockState()
        setStatus('Outil pret. Charge un fichier projet ou importe un JSON.', 'ok')
      }

      bootstrap()
    </script>
  </body>
</html>
