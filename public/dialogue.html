<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editeur de dialogues</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23111'/%3E%3Cpath d='M8 9h16v10H13l-5 4v-4H8z' fill='none' stroke='%23fff' stroke-width='2' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f3f3f3;
        --panel: #ffffff;
        --muted: #666;
        --line: #d0d0d0;
        --line-soft: rgba(0, 0, 0, 0.08);
        --text: #111;
        --accent: #111;
        --primary-blue: #0057ff;
        --primary-red: #d41c1c;
        --primary-yellow: #f5b400;
        --primary-green: #0f9d58;
        --ok: #0b8f3f;
        --warn: #b56a00;
        --danger: #cc1d1d;
        --shadow: rgba(0, 0, 0, 0.1);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }
      .topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid #222;
        background: #111;
        position: sticky;
        top: 0;
        z-index: 4;
        box-shadow: 0 8px 20px var(--shadow);
      }
      .topbar h1 {
        margin: 0;
        font-size: 0.96rem;
        letter-spacing: 0.03em;
        color: #fff;
      }
      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid #444;
        background: #1b1b1b;
        color: #fff;
        font-size: 1.1rem;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .icon-btn .ico {
        width: 17px;
        height: 17px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .icon-btn:hover {
        background: #282828;
      }
      .btn {
        border: 1px solid #111;
        background: #fff;
        color: #111;
        border-radius: 11px;
        padding: 8px 13px;
        cursor: pointer;
        font: inherit;
        font-size: 0.84rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
        transition: border-color 120ms ease, transform 120ms ease, filter 120ms ease;
      }
      .btn .ico {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex: 0 0 14px;
      }
      .btn:hover { transform: translateY(-1px); border-color: #111; filter: brightness(0.97); }
      .btn.secondary {
        background: #f5f5f5;
        border-color: #555;
      }
      .btn.warn {
        background: #fff4f4;
        border-color: #c25e5e;
        color: #8d1010;
      }
      .btn.tone-blue {
        background: #eaf1ff;
        border-color: #0057ff;
        color: #0039ad;
      }
      .btn.tone-green {
        background: #eaf8ef;
        border-color: #0f9d58;
        color: #0a6e3e;
      }
      .btn.tone-amber {
        background: #fff8df;
        border-color: #d29c00;
        color: #8b6700;
      }
      .btn.tone-red {
        background: #ffefef;
        border-color: #d41c1c;
        color: #991313;
      }
      .btn.tone-slate {
        background: #f0f0f0;
        border-color: #535353;
        color: #222;
      }
      .spacer { flex: 1; }
      .status {
        font-size: 0.8rem;
        color: var(--muted);
      }
      .topbar .status { color: #e5e5e5; }
      .layout {
        min-height: 0;
        display: grid;
        grid-template-columns: 320px 1fr;
        background: #fafafa;
      }
      .layout.right-open {
        grid-template-columns: 320px 1fr 410px;
      }
      .layout.left-collapsed {
        grid-template-columns: 1fr;
      }
      .layout.left-collapsed.right-open {
        grid-template-columns: 1fr 410px;
      }
      .panel {
        border-right: 1px solid var(--line);
        background: var(--panel);
        min-height: 0;
        overflow: auto;
      }
      .layout.left-collapsed .panel.left {
        display: none;
      }
      .panel.right {
        display: none;
        border-right: 0;
        border-left: 1px solid var(--line);
      }
      .layout.right-open .panel.right {
        display: block;
      }
      .section {
        padding: 13px;
        border-bottom: 1px solid var(--line-soft);
      }
      .section h2 {
        margin: 0 0 10px;
        font-size: 0.84rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #1f1f1f;
      }
      .menu-actions {
        display: grid;
        gap: 8px;
      }
      .menu-actions .btn {
        width: 100%;
        text-align: left;
        justify-content: flex-start;
      }
      .kpi-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .menu-note {
        font-size: 0.76rem;
        color: #666;
        margin-top: 6px;
      }
      .dialogue-list {
        display: grid;
        gap: 8px;
      }
      .dialogue-item {
        width: 100%;
        text-align: left;
        border: 1px solid #303030;
        background: #fff;
        border-radius: 12px;
        padding: 9px 10px;
        cursor: pointer;
        color: #111;
        font: inherit;
        transition: transform 120ms ease, border-color 120ms ease;
      }
      .dialogue-item.active {
        border-color: #111;
        background: #f7f7f7;
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.08);
      }
      .dialogue-item:hover { transform: translateY(-1px); border-color: #4d4d4d; }
      .field {
        margin-bottom: 10px;
      }
      .field label {
        display: block;
        font-size: 0.73rem;
        letter-spacing: 0.02em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid #3b3b3b;
        background: #fff;
        color: #111;
        border-radius: 10px;
        padding: 8px;
        font: inherit;
      }
      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        outline: none;
        border-color: #111;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.14);
      }
      .field textarea { min-height: 78px; resize: vertical; }
      .inline {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .graph-wrap {
        position: relative;
        min-height: 0;
        overflow: hidden;
      }
      #graph {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(0,0,0,0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,0,0,0.055) 1px, transparent 1px),
          linear-gradient(180deg, #fff, #f7f7f7);
        background-size: 24px 24px, 24px 24px, cover;
      }
      .graph-wrap.link-pending #graph {
        cursor: copy;
      }
      .canvas-headup {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 3;
        display: grid;
        gap: 8px;
        max-width: min(520px, calc(100% - 24px));
        pointer-events: none;
      }
      .canvas-guide {
        border: 1px solid #d7d7d7;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.92);
        padding: 8px 10px;
        font-size: 0.78rem;
        color: #303030;
        backdrop-filter: blur(6px);
      }
      .bottom-dock {
        position: absolute;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        z-index: 4;
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border: 1px solid #252525;
        border-radius: 16px;
        background: rgba(17, 17, 17, 0.94);
        box-shadow: 0 16px 30px rgba(0, 0, 0, 0.2);
        overflow-x: auto;
        overflow-y: hidden;
        max-width: calc(100% - 20px);
      }
      .dock-group {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 6px;
        padding: 0 2px;
      }
      .dock-group + .dock-group {
        border-left: 1px solid rgba(255, 255, 255, 0.18);
        padding-left: 10px;
      }
      .btn.dock-btn {
        flex: 0 0 auto;
        border-radius: 10px;
        min-height: 34px;
        font-size: 0.76rem;
        padding: 6px 10px;
        white-space: nowrap;
      }
      .btn.dock-btn:disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }
      .quick-palette {
        position: absolute;
        z-index: 5;
        min-width: 218px;
        display: none;
        gap: 6px;
        padding: 8px;
        border-radius: 13px;
        border: 1px solid #333;
        background: rgba(22, 22, 22, 0.97);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      }
      .quick-palette.visible {
        display: grid;
      }
      .quick-palette__title {
        font-size: 0.73rem;
        color: #ddd;
        margin-bottom: 2px;
      }
      .quick-palette .btn {
        width: 100%;
        justify-content: flex-start;
      }
      .node-hover-tooltip {
        position: absolute;
        z-index: 6;
        display: none;
        max-width: min(420px, calc(100% - 24px));
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #2e2e2e;
        background: rgba(18, 18, 18, 0.96);
        color: #f4f4f4;
        font-size: 0.76rem;
        line-height: 1.35;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
        pointer-events: none;
        white-space: pre-wrap;
      }
      .node-hover-tooltip.visible {
        display: block;
      }
      .node-card {
        border: 1px solid #3a3a3a;
        background: #fff;
        border-radius: 12px;
        padding: 9px;
        margin-bottom: 11px;
      }
      .node-card h4 {
        margin: 0 0 8px;
        font-size: 0.78rem;
        color: #111;
      }
      .row-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .tiny {
        padding: 5px 8px;
        font-size: 0.75rem;
      }
      .btn.tiny .ico {
        width: 12px;
        height: 12px;
        flex-basis: 12px;
      }
      .btn.active {
        background: #111;
        color: #fff;
      }
      .btn.tone-amber.active {
        background: #f5b400;
        color: #111;
        border-color: #b68500;
      }
      .kv-row {
        display: grid;
        grid-template-columns: 1fr 1.2fr auto;
        gap: 6px;
        margin-bottom: 6px;
      }
      .kv-row input {
        border: 1px solid #3b3b3b;
        border-radius: 9px;
        padding: 6px 8px;
        font: inherit;
      }
      .inspector-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid #cfcfcf;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.74rem;
        color: #333;
        background: #fff;
      }
      .editor-guide {
        margin: 0 0 10px;
        padding: 8px 10px;
        border: 1px solid #d7d7d7;
        border-radius: 10px;
        background: #f9f9f9;
        font-size: 0.77rem;
        color: #444;
      }
      .editor-section {
        border: 1px solid #d7d7d7;
        border-radius: 12px;
        background: #fff;
        padding: 10px;
        margin-bottom: 10px;
      }
      .editor-section__title {
        margin: 0 0 4px;
        font-size: 0.86rem;
        color: #151515;
      }
      .editor-section__help {
        margin: 0 0 10px;
        font-size: 0.75rem;
        color: #666;
      }
      .editor-section.blue { border-left: 4px solid #0057ff; }
      .editor-section.red { border-left: 4px solid #d41c1c; }
      .editor-section.amber { border-left: 4px solid #f5b400; }
      .editor-section.green { border-left: 4px solid #0f9d58; }
      .editor-section.slate { border-left: 4px solid #444; }
      details.item {
        border: 1px solid #e2e2e2;
        border-radius: 10px;
        background: #fff;
        margin-bottom: 8px;
        padding: 6px 8px;
      }
      details.item > summary {
        cursor: pointer;
        font-size: 0.79rem;
        color: #1f1f1f;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .summary-meta {
        color: #666;
        font-size: 0.74rem;
      }
      .choice-overview {
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        background: #fafafa;
        padding: 8px;
        margin-bottom: 8px;
      }
      .choice-overview__row {
        display: grid;
        grid-template-columns: 24px 1fr auto;
        gap: 8px;
        align-items: center;
        font-size: 0.77rem;
        color: #222;
        padding: 4px 0;
      }
      .choice-overview__idx {
        width: 20px;
        height: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #d41c1c;
        color: #a61919;
        border-radius: 999px;
        font-size: 0.7rem;
        background: #fff;
      }
      .choice-overview__to {
        color: #666;
        font-size: 0.72rem;
      }
      .list-editor {
        border: 1px solid #d4d4d4;
        border-radius: 12px;
        background: #fff;
        padding: 10px;
        margin-bottom: 10px;
      }
      .list-editor h4 {
        margin: 0 0 8px;
        font-size: 0.8rem;
      }
      .list-item {
        border-top: 1px solid #ececec;
        padding-top: 8px;
        margin-top: 8px;
      }
      .list-item:first-of-type {
        border-top: 0;
        margin-top: 0;
        padding-top: 0;
      }
      .row-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .control {
        width: 100%;
        border: 1px solid #3b3b3b;
        border-radius: 9px;
        background: #fff;
        color: #111;
        padding: 7px 8px;
        font: inherit;
        font-size: 0.8rem;
      }
      .control:focus {
        outline: none;
        border-color: #111;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.12);
      }
      details.plain {
        border: 1px dashed #cfcfcf;
        border-radius: 10px;
        padding: 6px 8px;
        margin-top: 6px;
      }
      details.plain > summary {
        cursor: pointer;
        font-size: 0.78rem;
        color: #444;
      }
      .hint {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 6px;
      }
      .muted { color: var(--muted); }
      .empty {
        padding: 16px;
        color: var(--muted);
        font-size: 0.88rem;
      }
      .kpi {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border: 1px solid #3a3a3a;
        border-radius: 10px;
        font-size: 0.72rem;
        color: #222;
        background: #fff;
      }
      .ok { color: var(--ok); }
      .warn-txt { color: var(--warn); }
      .field-help {
        margin-top: 5px;
        font-size: 0.72rem;
        color: #666;
      }
      .app-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 30;
        padding: 16px;
      }
      .app-modal.visible {
        display: flex;
      }
      .app-modal__backdrop {
        position: absolute;
        inset: 0;
        border: 0;
        background: rgba(0, 0, 0, 0.42);
        cursor: pointer;
      }
      .app-modal__dialog {
        position: relative;
        z-index: 1;
        width: min(540px, calc(100vw - 32px));
        border-radius: 16px;
        border: 1px solid #1a1a1a;
        background: #fff;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
        padding: 14px;
      }
      .app-modal__title {
        margin: 0;
        font-size: 0.94rem;
      }
      .app-modal__message {
        margin: 8px 0 0;
        font-size: 0.84rem;
        color: #333;
      }
      .app-modal__input-wrap {
        margin-top: 12px;
      }
      .app-modal__input-wrap label {
        display: block;
        font-size: 0.74rem;
        color: #666;
        margin-bottom: 6px;
      }
      .app-modal__input {
        width: 100%;
        border: 1px solid #3b3b3b;
        border-radius: 10px;
        padding: 8px;
        font: inherit;
        color: #111;
        background: #fff;
      }
      .app-modal__input:focus {
        outline: none;
        border-color: #111;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.12);
      }
      .app-modal__actions {
        margin-top: 12px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .app-modal__actions .btn {
        min-width: 112px;
      }
      @media (max-width: 1300px) {
        .layout { grid-template-columns: 280px 1fr; }
        .layout.right-open { grid-template-columns: 280px 1fr 340px; }
        .layout.left-collapsed { grid-template-columns: 1fr; }
        .layout.left-collapsed.right-open { grid-template-columns: 1fr 340px; }
      }
      @media (max-width: 1080px) {
        .layout,
        .layout.right-open,
        .layout.left-collapsed,
        .layout.left-collapsed.right-open {
          grid-template-columns: 1fr;
        }
        .layout.left-collapsed .panel.left {
          display: none;
        }
        .panel.right {
          display: none;
        }
        .layout.right-open .panel.right {
          display: block;
        }
        .panel,
        .panel.right { border: 0; border-top: 1px solid var(--line); max-height: 38vh; }
        .graph-wrap { min-height: 44vh; }
        .bottom-dock {
          width: calc(100% - 20px);
          justify-content: flex-start;
          left: 10px;
          transform: none;
        }
        .node-hover-tooltip {
          max-width: calc(100% - 20px);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <button class="icon-btn" id="btnToggleLeft" aria-label="Ouvrir ou fermer le menu">☰</button>
        <h1>Editeur de dialogues</h1>
        <span class="spacer"></span>
        <span class="status" id="statusText">Pret.</span>
        <input type="file" id="fileInput" accept=".json,.kspn,application/json" hidden />
      </header>

      <main class="layout" id="layoutRoot">
        <aside class="panel left">
          <section class="section">
            <h2>Fichier</h2>
            <div class="menu-actions">
              <button class="btn tone-blue" id="btnLoadDefault">Charger dialogues du projet</button>
              <button class="btn tone-blue" id="btnImport">Importer fichier JSON / KSPN</button>
              <button class="btn tone-slate" id="btnRestoreLocal">Ouvrir sauvegarde locale</button>
              <button class="btn tone-slate" id="btnCloseFile">Fermer fichier courant</button>
              <button class="btn tone-red" id="btnClearLocal">Effacer sauvegarde locale</button>
              <button class="btn tone-green" id="btnExport">Exporter fichier JSON</button>
            </div>
            <div class="menu-note" id="fileSourceText">Source active: aucune</div>
          </section>

          <section class="section">
            <h2>Canvas</h2>
          </section>

          <section class="section">
            <h2>Dialogues</h2>
            <div class="menu-actions" style="margin-bottom: 10px;">
              <button class="btn tone-blue" id="btnNewDialogue">Nouveau dialogue</button>
            </div>
            <div class="dialogue-list" id="dialogueList"></div>
          </section>

          <section class="section" id="dialogueMetaSection">
            <h2>Reglages du dialogue</h2>
            <div class="empty">Selectionne un dialogue.</div>
          </section>
        </aside>

        <section class="graph-wrap" id="graphWrap">
          <div id="graph"></div>
          <div class="canvas-headup">
            <div class="kpi-row">
              <span class="kpi">Blocs: <strong id="kpiNodes">0</strong></span>
              <span class="kpi">Liens: <strong id="kpiEdges">0</strong></span>
            </div>
            <div class="canvas-guide" id="canvasGuide">Double-clique dans le canvas pour ajouter un bloc.</div>
          </div>
          <div class="quick-palette" id="quickPalette" aria-hidden="true">
            <div class="quick-palette__title">Ajouter un bloc ici</div>
            <button class="btn dock-btn tone-blue" data-add-type="line"></button>
            <button class="btn dock-btn tone-red" data-add-type="choice"></button>
            <button class="btn dock-btn tone-amber" data-add-type="branch"></button>
            <button class="btn dock-btn tone-green" data-add-type="action"></button>
            <button class="btn dock-btn tone-slate" data-add-type="end"></button>
          </div>
          <div class="node-hover-tooltip" id="nodeHoverTooltip" aria-hidden="true"></div>

        { value: 'addMetier', label: 'Modifier un metier' },
        { value: 'switchScene', label: 'Changer de scene' },
        { value: 'startMiniGame', label: 'Lancer un mini-jeu' },

        { value: 'emit', label: 'Declencher un evenement' },
        { value: 'log', label: 'Log debug (console)' }
      ]

      const CONDITION_TYPE_OPTIONS = [
        { value: 'flagEquals', label: 'Flag egal a une valeur' },
        { value: 'flagTruthy', label: 'Flag actif (true)' },
        { value: 'metierAtLeast', label: 'Metier au moins' },
        { value: 'metierAtMost', label: 'Metier au plus' },
        { value: 'contextEquals', label: 'Contexte egal a une valeur' }
      ]

      const METIER_OPTIONS = [
        { value: 'INVENTEUR', label: 'Inventeur' },
        { value: 'MENEUR', label: 'Meneur' },
        { value: 'TRAVAILLEUR', label: 'Travailleur' },
        { value: 'BOTANISTE', label: 'Botaniste' }
      ]

      const LOCAL_SESSION_STORAGE_KEY = 'dialogue-editor.session.v1'
      const PROJECT_DIALOGUES_CANDIDATE_PATHS = [
        './src/Experience/Dialogues/dialogues.export.json',
        './src/Experience/Dialogues/dialogues.json',
        './dialogues.export.json',
        './dialogues.json'
      ]

      function iconSvg(name) {
        const paths = ICON_MAP[name] || ICON_MAP.block
        return `<svg class="ico" viewBox="0 0 16 16" aria-hidden="true">${paths}</svg>`
      }

      function setButtonVisual(button, { label, icon, tone } = {}) {
        if(!button) {
          return
        }

        if(tone) {
          BUTTON_TONE_CLASSES.forEach((className) => button.classList.remove(className))
          button.classList.add(`tone-${tone}`)
        }

        const text = label ?? button.textContent.trim()
        button.innerHTML = `${iconSvg(icon || 'block')}<span>${text}</span>`
      }

      const state = {
        dialogues: {},
        layouts: {},
        file: {
          sourceLabel: 'Aucune source'
        },
        ui: {
          leftPanelOpen: true,
          rightPanelVisible: false,
          linkSourceId: null,
          quickPaletteCanvasPos: null,
          inspectorDetailsOpen: {}
        }
      }

      let currentDialogueKey = null
      let selectedNodeId = null
      const inspectorObjectKeys = new WeakMap()
      let inspectorObjectKeyCounter = 1
      let lastPersistedSessionSnapshot = ''
      let localSessionPersistInterval = null

      const nodesDS = new vis.DataSet()
      const edgesDS = new vis.DataSet()
      let network = null

      const refs = {
        dialogueList: document.getElementById('dialogueList'),
        dialogueMetaSection: document.getElementById('dialogueMetaSection'),
        nodeInspectorSection: document.getElementById('nodeInspectorSection'),
        layoutRoot: document.getElementById('layoutRoot'),
        graphWrap: document.getElementById('graphWrap'),
        statusText: document.getElementById('statusText'),
        canvasGuide: document.getElementById('canvasGuide'),
        quickPalette: document.getElementById('quickPalette'),
        nodeHoverTooltip: document.getElementById('nodeHoverTooltip'),
        kpiNodes: document.getElementById('kpiNodes'),
        kpiEdges: document.getElementById('kpiEdges'),
        btnLoadDefault: document.getElementById('btnLoadDefault'),
        btnImport: document.getElementById('btnImport'),
        btnRestoreLocal: document.getElementById('btnRestoreLocal'),
        btnCloseFile: document.getElementById('btnCloseFile'),
        btnClearLocal: document.getElementById('btnClearLocal'),
        btnNewDialogue: document.getElementById('btnNewDialogue'),
        btnToggleLeft: document.getElementById('btnToggleLeft'),
        dockAddLine: document.getElementById('dockAddLine'),
        dockAddChoice: document.getElementById('dockAddChoice'),
        dockAddBranch: document.getElementById('dockAddBranch'),
        dockAddAction: document.getElementById('dockAddAction'),
        dockAddEnd: document.getElementById('dockAddEnd'),
        dockStartLink: document.getElementById('dockStartLink'),
        dockAutoLayout: document.getElementById('dockAutoLayout'),
        dockFitView: document.getElementById('dockFitView'),
        btnExport: document.getElementById('btnExport'),
        fileInput: document.getElementById('fileInput'),
        fileSourceText: document.getElementById('fileSourceText'),
        appModalRoot: document.getElementById('appModalRoot'),
        appModalBackdrop: document.getElementById('appModalBackdrop'),
        appModalTitle: document.getElementById('appModalTitle'),
        appModalMessage: document.getElementById('appModalMessage'),
        appModalInputWrap: document.getElementById('appModalInputWrap'),
        appModalInputLabel: document.getElementById('appModalInputLabel'),
        appModalInput: document.getElementById('appModalInput'),
        appModalCancel: document.getElementById('appModalCancel'),
        appModalConfirm: document.getElementById('appModalConfirm')
      }

      function setStatus(message, type = 'normal') {
        refs.statusText.textContent = message
        refs.statusText.className = `status ${type === 'ok' ? 'ok' : type === 'warn' ? 'warn-txt' : ''}`
      }

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value))
      }

      function hasDialoguesLoaded() {
        return Object.keys(state.dialogues).length > 0
      }

      function hasLocalSessionSaved() {
        try {
          return Boolean(window.localStorage.getItem(LOCAL_SESSION_STORAGE_KEY))
        } catch(error) {
          return false
        }
      }

      function updateFileControlsState() {
        const hasLocal = hasLocalSessionSaved()
        refs.btnRestoreLocal.disabled = !hasLocal
        refs.btnClearLocal.disabled = !hasLocal
        refs.btnCloseFile.disabled = !hasDialoguesLoaded()
      }

      function setActiveSourceLabel(label = 'Aucune source') {
        state.file.sourceLabel = label
        if(refs.fileSourceText) {
          refs.fileSourceText.textContent = `Source active: ${label}`
        }
        updateFileControlsState()
      }

      function serializeLocalSessionPayload() {
        return JSON.stringify({
          version: 1,
          savedAt: new Date().toISOString(),
          sourceLabel: state.file.sourceLabel,
          dialogues: deepClone(state.dialogues),
          layouts: deepClone(state.layouts)
        })
      }

      function persistLocalSession({ force = false } = {}) {
        if(!hasDialoguesLoaded()) {
          return false
        }

        try {
          const payload = serializeLocalSessionPayload()
          if(!force && payload === lastPersistedSessionSnapshot) {
            return false
          }
          window.localStorage.setItem(LOCAL_SESSION_STORAGE_KEY, payload)
          lastPersistedSessionSnapshot = payload
          updateFileControlsState()
          return true
        } catch(error) {
          return false
        }
      }

      function clearLocalSession({ silent = false } = {}) {
        try {
          window.localStorage.removeItem(LOCAL_SESSION_STORAGE_KEY)
          lastPersistedSessionSnapshot = ''
          updateFileControlsState()
          if(!silent) {
            setStatus('Sauvegarde locale effacee.', 'ok')
          }
          return true
        } catch(error) {
          if(!silent) {
            setStatus(`Impossible d effacer la sauvegarde locale (${error.message}).`, 'warn')
          }
          return false
        }
      }

      function resetEditorPanelsAndGraph() {
        currentDialogueKey = null
        selectedNodeId = null
        clearLinkArming()
        hideQuickPalette()
        state.ui.rightPanelVisible = false
        updateLayoutVisibility()
        renderDialogueList()
        renderDialogueMeta()
        renderNodeInspector()
        syncGraphFromDialogue()
        updateFileControlsState()
      }

      function applyDialoguesState(dialoguesMap, {
        layouts = null,
        sourceLabel = 'Aucune source',
        persist = true
      } = {}) {
        state.dialogues = normalizeData(dialoguesMap)
        if(layouts && typeof layouts === 'object') {
          state.layouts = deepClone(layouts)
          Object.keys(state.dialogues).forEach((key) => {
            if(!state.layouts[key]) {
              state.layouts[key] = buildAutoLayout(state.dialogues[key])
            }
          })
        } else {
          buildLayoutsForAllDialogues()
        }

        setActiveSourceLabel(sourceLabel)
        resetEditorPanelsAndGraph()

        if(persist) {
          persistLocalSession({ force: true })
        }
      }

      function loadLocalSessionIntoEditor({ silent = false } = {}) {
        let parsed

        try {
          const raw = window.localStorage.getItem(LOCAL_SESSION_STORAGE_KEY)
          if(!raw) {
            return false
          }
          parsed = JSON.parse(raw)
        } catch(error) {
          if(!silent) {
            setStatus(`Sauvegarde locale invalide (${error.message}).`, 'warn')
          }
          return false
        }

        const savedDialogues = parsed?.dialogues
        if(!savedDialogues || typeof savedDialogues !== 'object') {
          if(!silent) {
            setStatus('Sauvegarde locale vide.', 'warn')
          }
          return false
        }

        applyDialoguesState(savedDialogues, {
          layouts: parsed?.layouts,
          sourceLabel: parsed?.sourceLabel || 'Sauvegarde locale',
          persist: false
        })

        lastPersistedSessionSnapshot = JSON.stringify(parsed)
        updateFileControlsState()
        if(!silent) {
          setStatus('Sauvegarde locale chargee.', 'ok')
        }
        return true
      }

      function startLocalSessionAutoPersist() {
        if(localSessionPersistInterval) {
          return
        }

        localSessionPersistInterval = window.setInterval(() => {
          persistLocalSession()
        }, 1500)

        window.addEventListener('beforeunload', () => {
          persistLocalSession({ force: true })
        })
      }

      const modalState = {
        resolver: null,
        lastFocusedElement: null
      }

      function isModalVisible() {
        return refs.appModalRoot.classList.contains('visible')
      }

      function closeAppModal({ confirmed = false } = {}) {
        const resolver = modalState.resolver
        const value = refs.appModalInput.value

        modalState.resolver = null
        refs.appModalRoot.classList.remove('visible')
        refs.appModalRoot.setAttribute('aria-hidden', 'true')
        refs.appModalInputWrap.hidden = true
        refs.appModalInput.value = ''
        document.body.style.overflow = ''

        if(modalState.lastFocusedElement && typeof modalState.lastFocusedElement.focus === 'function') {
          modalState.lastFocusedElement.focus()
        }

        if(resolver) {
          resolver({ confirmed, value })
        }
      }

      function openAppModal({
        title = 'Confirmation',
        message = '',
        confirmLabel = 'Confirmer',
        cancelLabel = 'Annuler',
        tone = 'red',
        input = null
      } = {}) {
        if(modalState.resolver) {
          modalState.resolver({ confirmed: false, value: '' })
          modalState.resolver = null
        }

        return new Promise((resolve) => {
          modalState.lastFocusedElement = document.activeElement
          modalState.resolver = resolve

          refs.appModalTitle.textContent = title
          refs.appModalMessage.textContent = message
          refs.appModalCancel.textContent = cancelLabel
          refs.appModalConfirm.textContent = confirmLabel

          BUTTON_TONE_CLASSES.forEach((className) => refs.appModalConfirm.classList.remove(className))
          refs.appModalConfirm.classList.add(`tone-${tone}`)

          if(input) {
            refs.appModalInputWrap.hidden = false
            refs.appModalInputLabel.textContent = input.label || 'Valeur'
            refs.appModalInput.value = input.value || ''
            refs.appModalInput.placeholder = input.placeholder || ''
          } else {
            refs.appModalInputWrap.hidden = true
            refs.appModalInputLabel.textContent = 'Valeur'
            refs.appModalInput.value = ''
            refs.appModalInput.placeholder = ''
          }

          refs.appModalRoot.classList.add('visible')
          refs.appModalRoot.setAttribute('aria-hidden', 'false')
          document.body.style.overflow = 'hidden'

          requestAnimationFrame(() => {
            if(input) {
              refs.appModalInput.focus()
              refs.appModalInput.select()
            } else {
              refs.appModalConfirm.focus()
            }
          })
        })
      }

      async function showConfirmModal({
        title = 'Confirmation',
        message = '',
        confirmLabel = 'Confirmer',
        cancelLabel = 'Annuler',
        tone = 'red'
      } = {}) {
        const result = await openAppModal({ title, message, confirmLabel, cancelLabel, tone })
        return result.confirmed
      }

      async function showPromptModal({
        title = 'Saisie',
        message = '',
        confirmLabel = 'Valider',
        cancelLabel = 'Annuler',
        tone = 'blue',
        inputLabel = 'Valeur',
        inputValue = '',
        inputPlaceholder = ''
      } = {}) {
        const result = await openAppModal({
          title,
          message,
          confirmLabel,
          cancelLabel,
          tone,
          input: {
            label: inputLabel,
            value: inputValue,
            placeholder: inputPlaceholder
          }
        })
        return result.confirmed ? result.value : null
      }

      function updateLayoutVisibility() {
        const hasDialogueSelection = Boolean(currentDialogueKey)
        const shouldShowRight = state.ui.rightPanelVisible && hasDialogueSelection

        refs.layoutRoot.classList.toggle('left-collapsed', !state.ui.leftPanelOpen)
        refs.layoutRoot.classList.toggle('right-open', shouldShowRight)
        refs.btnToggleLeft.title = state.ui.leftPanelOpen ? 'Masquer menu' : 'Afficher menu'
        refs.btnToggleLeft.innerHTML = iconSvg(state.ui.leftPanelOpen ? 'menuClose' : 'menuOpen')
      }

      function hasSelectedNode() {
        const dialogue = currentDialogue()
        return Boolean(dialogue && selectedNodeId && dialogue.nodes[selectedNodeId])
      }

      function updateCanvasGuide() {
        if(!currentDialogueKey) {
          refs.canvasGuide.textContent = 'Selectionne un dialogue pour commencer.'
          return
        }
        if(state.ui.linkSourceId) {
          refs.canvasGuide.textContent = `Liaison active depuis ${state.ui.linkSourceId}. Clique un bloc cible.`
          return
        }
        refs.canvasGuide.textContent = 'Canvas actif.'
      }

      function updateDockState() {
        const linkActive = Boolean(state.ui.linkSourceId)
        const hasDialogue = Boolean(currentDialogueKey)

        setButtonVisual(refs.dockStartLink, {
          label: linkActive ? `Lier: ${state.ui.linkSourceId}` : 'Lier depuis la selection',
          icon: 'link',
          tone: linkActive ? 'amber' : 'slate'
        })

        refs.dockStartLink.classList.toggle('active', linkActive)
        refs.dockStartLink.disabled = !linkActive && !hasSelectedNode()
        refs.dockAddLine.disabled = !hasDialogue
        refs.dockAddChoice.disabled = !hasDialogue
        refs.dockAddBranch.disabled = !hasDialogue
        refs.dockAddAction.disabled = !hasDialogue
        refs.dockAddEnd.disabled = !hasDialogue
        refs.dockAutoLayout.disabled = !hasDialogue
        refs.dockFitView.disabled = nodesDS.length === 0
        refs.graphWrap.classList.toggle('link-pending', linkActive)
        updateCanvasGuide()
      }

      function hideQuickPalette() {
        state.ui.quickPaletteCanvasPos = null
        refs.quickPalette.classList.remove('visible')
        refs.quickPalette.setAttribute('aria-hidden', 'true')
      }

      function showQuickPalette(canvasPos) {
        if(!currentDialogueKey) {
          setStatus('Selectionne un dialogue avant d ajouter des blocs.', 'warn')
          return
        }
        if(!canvasPos || !network) {
          return
        }

        state.ui.quickPaletteCanvasPos = { x: canvasPos.x, y: canvasPos.y }
        const domPos = network.canvasToDOM(canvasPos)
        const wrapBounds = refs.graphWrap.getBoundingClientRect()

        refs.quickPalette.classList.add('visible')
        refs.quickPalette.setAttribute('aria-hidden', 'false')

        const paletteRect = refs.quickPalette.getBoundingClientRect()
        const maxX = wrapBounds.width - paletteRect.width - 10
        const maxY = wrapBounds.height - paletteRect.height - 10
        const left = Math.max(10, Math.min(domPos.x + 12, maxX))
        const top = Math.max(10, Math.min(domPos.y - 10, maxY))
        refs.quickPalette.style.left = `${left}px`
        refs.quickPalette.style.top = `${top}px`
      }

      function hideNodeHoverTooltip() {
        refs.nodeHoverTooltip.classList.remove('visible')
        refs.nodeHoverTooltip.setAttribute('aria-hidden', 'true')
        refs.nodeHoverTooltip.textContent = ''
      }

      function getNodeTooltipPreview(node) {
        const text = typeof node?.text === 'string' ? node.text.trim() : ''
        if(!text) {
          return ''
        }
        const normalized = text.replace(/\s+/g, ' ').trim()
        if(normalized.length <= 260) {
          return normalized
        }
        return `${normalized.slice(0, 259)}…`
      }

      function showNodeHoverTooltip(nodeId) {
        if(!network || !nodeId) {
          hideNodeHoverTooltip()
          return
        }

        const dialogue = currentDialogue()
        const node = dialogue?.nodes?.[nodeId]
        const preview = getNodeTooltipPreview(node)
        if(!preview) {
          hideNodeHoverTooltip()
          return
        }

        const canvasPos = network.getPositions([nodeId])?.[nodeId]
        if(!canvasPos) {
          hideNodeHoverTooltip()
          return
        }

        const domPos = network.canvasToDOM(canvasPos)
        const tooltip = refs.nodeHoverTooltip
        tooltip.textContent = preview
        tooltip.classList.add('visible')
        tooltip.setAttribute('aria-hidden', 'false')
        tooltip.style.left = '0px'
        tooltip.style.top = '0px'

        const wrapRect = refs.graphWrap.getBoundingClientRect()
        const tipRect = tooltip.getBoundingClientRect()

        const leftMin = 8
        const topMin = 8
        const leftMax = Math.max(leftMin, wrapRect.width - tipRect.width - 8)
        const topMax = Math.max(topMin, wrapRect.height - tipRect.height - 8)

        const left = Math.max(leftMin, Math.min(domPos.x - tipRect.width / 2, leftMax))
        const top = Math.max(topMin, Math.min(domPos.y - tipRect.height - 18, topMax))

        tooltip.style.left = `${left}px`
        tooltip.style.top = `${top}px`
      }

      function decorateStaticButtons() {
        setButtonVisual(refs.btnLoadDefault, { label: 'Charger dialogues du projet', icon: 'folder', tone: 'blue' })
        setButtonVisual(refs.btnImport, { label: 'Importer fichier JSON / KSPN', icon: 'upload', tone: 'blue' })
        setButtonVisual(refs.btnRestoreLocal, { label: 'Ouvrir sauvegarde locale', icon: 'folder', tone: 'slate' })
        setButtonVisual(refs.btnCloseFile, { label: 'Fermer fichier courant', icon: 'close', tone: 'slate' })
        setButtonVisual(refs.btnClearLocal, { label: 'Effacer sauvegarde locale', icon: 'trash', tone: 'red' })
        setButtonVisual(refs.btnExport, { label: 'Exporter fichier JSON', icon: 'download', tone: 'green' })
        setButtonVisual(refs.btnNewDialogue, { label: 'Nouveau dialogue', icon: 'dialogue', tone: 'blue' })

        setButtonVisual(refs.dockAddLine, NODE_TYPE_UI.line)
        setButtonVisual(refs.dockAddChoice, NODE_TYPE_UI.choice)
        setButtonVisual(refs.dockAddBranch, NODE_TYPE_UI.branch)
        setButtonVisual(refs.dockAddAction, NODE_TYPE_UI.action)
        setButtonVisual(refs.dockAddEnd, NODE_TYPE_UI.end)
        setButtonVisual(refs.dockStartLink, { label: 'Lier depuis la selection', icon: 'link', tone: 'slate' })
        setButtonVisual(refs.dockAutoLayout, { label: 'Auto layout', icon: 'layout', tone: 'amber' })
        setButtonVisual(refs.dockFitView, { label: 'Cadrer', icon: 'focus', tone: 'slate' })

        refs.quickPalette.querySelectorAll('[data-add-type]').forEach((button) => {
          const type = button.dataset.addType
          const ui = NODE_TYPE_UI[type]
          if(ui) {
            setButtonVisual(button, ui)
          }
        })

        updateFileControlsState()
      }

      function createNode(type = 'line') {
        if(type === 'choice') {
          return {
            type: 'choice',
            speaker: 'Bloom',
            text: '',
            choices: []
          }
        }
        if(type === 'branch') {
          return {
            type: 'branch',
            branches: [],
            fallbackNext: ''
          }
        }
        if(type === 'action') {
          return {
            type: 'action',
            run: [],
            next: ''
          }
        }
        if(type === 'end') {
          return {
            type: 'end',
            actions: []
          }
        }

        return {
          type: 'line',
          speaker: 'Bloom',
          text: '',
          next: ''
        }
      }

      function normalizeDialogue(rawKey, rawDialogue) {
        const key = typeof rawDialogue?.key === 'string' && rawDialogue.key.trim() !== ''
          ? rawDialogue.key.trim()
          : rawKey

        const nodes = {}
        const rawNodes = rawDialogue?.nodes || {}
        for(const nodeId of Object.keys(rawNodes)) {
          const rawNode = rawNodes[nodeId] || {}
          const type = rawNode.type || 'line'
          const base = createNode(type)
          nodes[nodeId] = { ...base, ...rawNode, type }
        }

        return {
          key,
          once: Boolean(rawDialogue?.once),
          startNode: rawDialogue?.startNode || Object.keys(nodes)[0] || '',
          nodes
        }
      }

      function normalizeData(input) {
        const map = input?.dialogues && typeof input.dialogues === 'object'
          ? input.dialogues
          : (typeof input === 'object' ? input : {})

        const normalized = {}
        for(const key of Object.keys(map)) {
          normalized[key] = normalizeDialogue(key, map[key])
        }
        return normalized
      }

      function currentDialogue() {
        return state.dialogues[currentDialogueKey] || null
      }

      function currentLayout() {
        if(!currentDialogueKey) {
          return {}
        }
        if(!state.layouts[currentDialogueKey]) {
          state.layouts[currentDialogueKey] = {}
        }
        return state.layouts[currentDialogueKey]
      }

      function getNodeTargets(dialogue, node) {
        const targets = []
        const push = (nodeId) => {
          if(typeof nodeId !== 'string' || nodeId.trim() === '') {
            return
          }
          if(!dialogue.nodes[nodeId]) {
            return
          }
          if(!targets.includes(nodeId)) {
            targets.push(nodeId)
          }
        }

        push(node.next)
        push(node.fallbackNext)

        if(Array.isArray(node.choices)) {
          node.choices.forEach((choice) => push(choice.next))
        }
        if(Array.isArray(node.branches)) {
          node.branches.forEach((branch) => push(branch.next))
        }

        return targets
      }

      function buildAutoLayout(dialogue) {
        const ids = Object.keys(dialogue.nodes)
        if(ids.length === 0) {
          return {}
        }

        const start = dialogue.startNode && dialogue.nodes[dialogue.startNode]
          ? dialogue.startNode
          : ids[0]

        const outgoing = {}
        const parents = {}
        ids.forEach((id) => {
          outgoing[id] = []
          parents[id] = []
        })

        ids.forEach((id) => {
          const targets = getNodeTargets(dialogue, dialogue.nodes[id])
          targets.forEach((toId) => {
            outgoing[id].push(toId)
            parents[toId].push(id)
          })
        })

        const levelOf = {}
        levelOf[start] = 0
        const queue = [start]
        while(queue.length > 0) {
          const currentId = queue.shift()
          const currentLevel = levelOf[currentId]

          outgoing[currentId].forEach((nextId) => {
            const nextLevel = currentLevel + 1
            if(levelOf[nextId] === undefined || nextLevel < levelOf[nextId]) {
              levelOf[nextId] = nextLevel
              queue.push(nextId)
            }
          })
        }

        let maxLevel = Math.max(...Object.values(levelOf), 0)
        ids.forEach((id) => {
          if(levelOf[id] === undefined) {
            maxLevel += 1
            levelOf[id] = maxLevel
          }
        })

        const groups = {}
        ids.forEach((id) => {
          const level = levelOf[id]
          if(!groups[level]) {
            groups[level] = []
          }
          groups[level].push(id)
        })

        const orderedLevels = Object.keys(groups)
          .map(Number)
          .sort((a, b) => a - b)

        const rank = {}
        orderedLevels.forEach((level, levelIndex) => {
          const nodesAtLevel = groups[level]
          if(levelIndex === 0) {
            nodesAtLevel.sort((a, b) => a.localeCompare(b))
            nodesAtLevel.forEach((id, index) => {
              rank[id] = index
            })
            return
          }

          nodesAtLevel.sort((a, b) => {
            const aParents = parents[a] || []
            const bParents = parents[b] || []

            const score = (list) => {
              if(list.length === 0) {
                return Number.POSITIVE_INFINITY
              }
              return list.reduce((sum, parentId) => sum + (rank[parentId] ?? 0), 0) / list.length
            }

            const delta = score(aParents) - score(bParents)
            if(delta !== 0) {
              return delta
            }
            return a.localeCompare(b)
          })

          nodesAtLevel.forEach((id, index) => {
            rank[id] = index
          })
        })

        const spacingX = 360
        const spacingY = 190
        const result = {}

        orderedLevels.forEach((level) => {
          const nodesAtLevel = groups[level]
          const totalHeight = (nodesAtLevel.length - 1) * spacingY
          nodesAtLevel.forEach((id, index) => {
            result[id] = {
              x: level * spacingX,
              y: index * spacingY - totalHeight / 2
            }
          })
        })

        return result
      }

      function ensureLayoutForCurrentDialogue() {
        const dialogue = currentDialogue()
        if(!dialogue) {
          return
        }

        const layout = currentLayout()
        let requiresLayout = false

        Object.keys(layout).forEach((id) => {
          if(!dialogue.nodes[id]) {
            delete layout[id]
          }
        })

        Object.keys(dialogue.nodes).forEach((id) => {
          if(!layout[id]) {
            requiresLayout = true
          }
        })

        if(requiresLayout || Object.keys(layout).length === 0) {
          state.layouts[currentDialogueKey] = buildAutoLayout(dialogue)
        }
      }

      function buildLayoutsForAllDialogues() {
        const layouts = {}
        Object.entries(state.dialogues).forEach(([dialogueKey, dialogue]) => {
          layouts[dialogueKey] = buildAutoLayout(dialogue)
        })
        state.layouts = layouts
      }

      function autoLayoutCurrentDialogue({ fit = true } = {}) {
        const dialogue = currentDialogue()
        if(!dialogue) {
          return
        }

        state.layouts[currentDialogueKey] = buildAutoLayout(dialogue)
        syncGraphFromDialogue()
        if(fit) {
          network.fit({ animation: { duration: 420, easingFunction: 'easeInOutQuad' } })
        }
      }

      function selectDialogue(key) {
        if(!state.dialogues[key]) {
          return
        }
        currentDialogueKey = key
        selectedNodeId = null
        clearLinkArming()
        hideQuickPalette()
        state.ui.rightPanelVisible = true
        updateLayoutVisibility()
        renderDialogueList()
        renderDialogueMeta()
        renderNodeInspector()
        syncGraphFromDialogue()
      }

      function createDialogue(baseKey = 'dialogue.new', { select = false } = {}) {
        const key = uniqueDialogueKey(baseKey)
        state.dialogues[key] = {
          key,
          once: false,
          startNode: '',
          nodes: {}
        }
        state.layouts[key] = {}

        if(select) {
          selectDialogue(key)
          setStatus(`Dialogue cree: ${key}`, 'ok')
          return
        }

        currentDialogueKey = null
        selectedNodeId = null
        clearLinkArming()
        hideQuickPalette()
        state.ui.rightPanelVisible = false
        updateLayoutVisibility()
        renderDialogueList()
        renderDialogueMeta()
        renderNodeInspector()
        syncGraphFromDialogue()
        setStatus(`Dialogue cree: ${key}. Clique dessus pour l ouvrir.`, 'ok')
      }

      function uniqueDialogueKey(base) {
        let index = 1
        let key = base
        while(state.dialogues[key]) {
          key = `${base}.${index++}`
        }
        return key
      }

      function uniqueNodeId(prefix = 'node') {
        const dialogue = currentDialogue()
        let index = 1
        let id = `${prefix}_${index}`
        while(dialogue.nodes[id]) {
          id = `${prefix}_${++index}`
        }
        return id
      }

      function renameDialogue(oldKey, newKey) {
        const normalized = newKey.trim()
        if(!normalized || normalized === oldKey) {
          return
        }
        if(state.dialogues[normalized]) {
          setStatus(`Cle dialogue deja utilisee: ${normalized}`, 'warn')
          return
        }

        const copy = state.dialogues[oldKey]
        const layout = state.layouts[oldKey] || {}
        delete state.dialogues[oldKey]
        delete state.layouts[oldKey]
        copy.key = normalized
        state.dialogues[normalized] = copy
        state.layouts[normalized] = layout
        currentDialogueKey = normalized
        renderDialogueList()
        setStatus(`Dialogue renomme: ${normalized}`, 'ok')
      }

      function renameNode(oldId, newId) {
        const dialogue = currentDialogue()
        const targetId = newId.trim()
        if(!targetId || targetId === oldId) {
          return true
        }
        if(dialogue.nodes[targetId]) {
          setStatus(`Identifiant de bloc deja pris: ${targetId}`, 'warn')
          return false
        }

        dialogue.nodes[targetId] = dialogue.nodes[oldId]
        delete dialogue.nodes[oldId]

        if(dialogue.startNode === oldId) {
          dialogue.startNode = targetId
        }

        replaceNodeReferences(dialogue, oldId, targetId)
        const layout = currentLayout()
        if(layout[oldId]) {
          layout[targetId] = layout[oldId]
          delete layout[oldId]
        }
        selectedNodeId = targetId
        return true
      }

      function replaceNodeReferences(dialogue, oldId, newId) {
        for(const node of Object.values(dialogue.nodes)) {
          if(node.next === oldId) {
            node.next = newId
          }
          if(node.fallbackNext === oldId) {
            node.fallbackNext = newId
          }
          if(Array.isArray(node.choices)) {
            node.choices.forEach((choice) => {
              if(choice.next === oldId) {
                choice.next = newId
              }
            })
          }
          if(Array.isArray(node.branches)) {
            node.branches.forEach((branch) => {
              if(branch.next === oldId) {
                branch.next = newId
              }
            })
          }
        }
      }

      function removeNodeReferences(dialogue, targetId) {
        for(const node of Object.values(dialogue.nodes)) {
          if(node.next === targetId) {
            node.next = ''
          }
          if(node.fallbackNext === targetId) {
            node.fallbackNext = ''
          }
          if(Array.isArray(node.choices)) {
            node.choices.forEach((choice) => {
              if(choice.next === targetId) {
                choice.next = ''
              }
            })
          }
          if(Array.isArray(node.branches)) {
            node.branches.forEach((branch) => {
              if(branch.next === targetId) {
                branch.next = ''
              }
            })
          }
        }
      }

      function deleteCurrentNode() {
        deleteNodeById(selectedNodeId)
      }

      function deleteNodeById(nodeId) {
        const dialogue = currentDialogue()
        if(!dialogue || !nodeId || !dialogue.nodes[nodeId]) {
          return
        }

        const removedId = nodeId
        delete dialogue.nodes[removedId]
        delete currentLayout()[removedId]
        removeNodeReferences(dialogue, removedId)

        if(dialogue.startNode === removedId) {
          dialogue.startNode = Object.keys(dialogue.nodes)[0] || ''
        }

        if(state.ui.linkSourceId === removedId) {
          clearLinkArming()
        }

        if(selectedNodeId === removedId) {
          selectedNodeId = null
        }
        renderDialogueMeta()
        renderNodeInspector()
        syncGraphFromDialogue()
        setStatus(`Bloc supprime: ${removedId}`, 'ok')
      }

      function getViewportCenter() {
        if(!network) {
          return { x: 0, y: 0 }
        }
        const center = network.getViewPosition()
        return { x: center.x, y: center.y }
      }

      function addNode(type = 'line', { canvasPos = null } = {}) {
        const dialogue = currentDialogue()
        if(!dialogue) {
          setStatus('Selectionne un dialogue avant d ajouter un bloc.', 'warn')
          return
        }

        const nodeId = uniqueNodeId(type)
        dialogue.nodes[nodeId] = createNode(type)
        const layout = currentLayout()
        const anchor = canvasPos
          ? { x: canvasPos.x, y: canvasPos.y }
          : (selectedNodeId && layout[selectedNodeId]
              ? { x: layout[selectedNodeId].x + 290, y: layout[selectedNodeId].y + 120 }
              : getViewportCenter())

        layout[nodeId] = {
          x: anchor.x,
          y: anchor.y
        }

        if(!dialogue.startNode) {
          dialogue.startNode = nodeId
        }

        selectedNodeId = nodeId
        state.ui.rightPanelVisible = true
        hideQuickPalette()
        updateLayoutVisibility()
        renderDialogueMeta()
        renderNodeInspector()
        syncGraphFromDialogue()
        setStatus(`Bloc ajoute: ${nodeId}`, 'ok')
      }

      function clearLinkArming() {
        state.ui.linkSourceId = null
        updateDockState()
      }

      function armLinkFromSelection() {
        const dialogue = currentDialogue()
        if(!dialogue || !selectedNodeId || !dialogue.nodes[selectedNodeId]) {
          setStatus('Selectionne un bloc pour demarrer une liaison.', 'warn')
          return
        }
        state.ui.linkSourceId = selectedNodeId
        hideQuickPalette()
        updateDockState()
        setStatus(`Liaison active depuis ${selectedNodeId}. Clique un bloc cible.`, 'ok')
      }

      function connectNodes(fromId, toId) {
        const dialogue = currentDialogue()
        if(!dialogue || !dialogue.nodes[fromId] || !dialogue.nodes[toId]) {
          setStatus('Impossible de creer le lien entre ces blocs.', 'warn')
          return false
        }

        const source = dialogue.nodes[fromId]

        if(source.type === 'end') {
          setStatus('Un bloc de fin ne peut pas avoir de sortie.', 'warn')
          return false
        }

        if(source.type === 'line' || source.type === 'action') {
          source.next = toId
          setStatus(`Lien cree: ${fromId} -> ${toId}`, 'ok')
          return true
        }

        if(source.type === 'choice') {
          if(!Array.isArray(source.choices)) {
            source.choices = []
          }

          let slot = source.choices.find((choice) => !choice.next)
          if(!slot) {
            slot = {
              id: `choice_${source.choices.length + 1}`,
              text: 'Nouvelle reponse',
              next: ''
            }
            source.choices.push(slot)
          }

          slot.next = toId
          setStatus(`Lien cree sur une reponse: ${fromId} -> ${toId}`, 'ok')
          return true
        }

        if(source.type === 'branch') {
          if(!Array.isArray(source.branches)) {
            source.branches = []
          }

          let slot = source.branches.find((branch) => !branch.next)
          if(!slot) {
            slot = { conditions: [], next: '' }
            source.branches.push(slot)
          }

          slot.next = toId
          setStatus(`Lien cree sur une regle: ${fromId} -> ${toId}`, 'ok')
          return true
        }

        setStatus('Type de bloc non gere pour la liaison.', 'warn')
        return false
      }

      function toEditorValue(value) {
        if(value === null) {
          return 'null'
        }
        if(typeof value === 'string') {
          return value
        }
        if(typeof value === 'number' || typeof value === 'boolean') {
          return String(value)
        }
        try {
          return JSON.stringify(value)
        } catch(error) {
          return String(value)
        }
      }

      function parseEditorValue(rawValue) {
        const value = rawValue.trim()
        if(value === '') {
          return ''
        }
        if(value === 'true') {
          return true
        }
        if(value === 'false') {
          return false
        }
        if(value === 'null') {
          return null
        }
        if(/^-?\d+(\.\d+)?$/.test(value)) {
          return Number(value)
        }
        if((value.startsWith('{') && value.endsWith('}')) || (value.startsWith('[') && value.endsWith(']'))) {
          try {
            return JSON.parse(value)
          } catch(error) {
            return rawValue
          }
        }
        return rawValue
      }

      function asObjectArray(list) {
        if(!Array.isArray(list)) {
          return []
        }
        return list.map((item) => {
          if(item && typeof item === 'object' && !Array.isArray(item)) {
            return { ...item }
          }
          return {}
        })
      }

      function createControlSelect(options, value, onChange) {
        const select = document.createElement('select')
        select.className = 'control'

        options.forEach((optionData) => {
          const option = document.createElement('option')
          option.value = optionData.value
          option.textContent = optionData.label
          select.appendChild(option)
        })

        if(value && !options.some((optionData) => optionData.value === value)) {
          const custom = document.createElement('option')
          custom.value = value
          custom.textContent = `${value} (personnalise)`
          select.appendChild(custom)
        }

        select.value = value ?? options[0]?.value ?? ''
        select.addEventListener('change', () => onChange(select.value))
        return select
      }

      function createControlInput(value, onChange, { placeholder = '', smart = false } = {}) {
        const input = document.createElement('input')
        input.className = 'control'
        input.value = value === undefined ? '' : toEditorValue(value)
        input.placeholder = placeholder
        input.addEventListener('blur', () => {
          onChange(smart ? parseEditorValue(input.value) : input.value)
        })
        return input
      }

      function normalizeAction(action = {}) {
        const type = action.type || 'setFlag'
        action.type = type
        if(type === 'setFlag') {
          action.key = action.key ?? ''
          action.value = action.value ?? true
        } else if(type === 'addMetier') {
          action.metier = action.metier ?? 'INVENTEUR'
          action.amount = Number(action.amount ?? 0)
        } else if(type === 'switchScene') {
          action.scene = action.scene ?? ''
        } else if(type === 'startMiniGame') {
          action.key = action.key ?? ''
          action.payload = action.payload ?? null
        } else if(type === 'startDialogue') {
          action.key = action.key ?? ''
        } else if(type === 'moveBloomToRailNode') {
          action.nodeId = action.nodeId ?? ''
          action.lockToNode = action.lockToNode ?? false
        } else if(type === 'setHudHint') {
          action.text = action.text ?? ''
        } else if(type === 'emit') {
          action.event = action.event ?? ''
          action.payload = action.payload ?? null
        } else if(type === 'log') {
          action.message = action.message ?? ''
        }
      }

      function normalizeCondition(condition = {}) {
        const type = condition.type || 'flagEquals'
        condition.type = type
        if(type === 'flagEquals') {
          condition.key = condition.key ?? ''
          condition.value = condition.value ?? true
        } else if(type === 'flagTruthy') {
          condition.key = condition.key ?? ''
        } else if(type === 'metierAtLeast' || type === 'metierAtMost') {
          condition.metier = condition.metier ?? 'INVENTEUR'
          condition.value = Number(condition.value ?? 0)
        } else if(type === 'contextEquals') {
          condition.key = condition.key ?? ''
          condition.value = condition.value ?? ''
        }
      }

              commit()
            }, { placeholder: 'ex: intro.terminee' })
          }))
          parent.appendChild(createField({
            label: 'Valeur du flag',

              commit()
            }, { placeholder: 'true / false / texte / nombre', smart: true })

              commit()
            })

            element: createControlInput(action.amount, (value) => {

              commit()
            }, { placeholder: 'ex: -2 ou 5', smart: true })
          }))

        }

              commit()
            }, { placeholder: 'ex: ville' })
          }))

        }

        if(action.type === 'startMiniGame') {

            element: createControlInput(action.key, (value) => {
              action.key = value
              commit()
            }, { placeholder: 'ex: puzzle_intro' })

              commit()
            }, { placeholder: 'texte, nombre, true/false, JSON', smart: true })

              action.nodeId = value
              commit()
            }, { placeholder: 'ex: n4' })
          }))
          parent.appendChild(createField({
            label: 'Rester fixe sur ce node',
            element: createControlSelect([
              { value: 'false', label: 'Non (reprendre le follow ensuite)' },
              { value: 'true', label: 'Oui (garder ce node en cible)' }
            ], String(Boolean(action.lockToNode)), (value) => {
              action.lockToNode = value === 'true'
              commit()
            })
          }))
          return
        }

        if(action.type === 'setHudHint') {
          const hintText = document.createElement('textarea')
          hintText.className = 'control'
          hintText.value = action.text ?? ''
          hintText.placeholder = 'Message HUD'
          hintText.addEventListener('input', () => {
            action.text = hintText.value

        if(action.type === 'emit') {

            label: 'Nom de l evenement',

            }, { placeholder: 'ex: ui.flash' })
          }))

              action.payload = value

            }, { placeholder: 'texte, nombre, true/false, JSON', smart: true })
          }))

        }

        if(action.type === 'log') {
          parent.appendChild(createField({
            label: 'Message console',
            element: createControlInput(action.message, (value) => {
              action.message = value
              commit()
            }, { placeholder: 'Message debug' })
          }))
          return
        }

        const fallback = document.createElement('div')
        fallback.className = 'field-help'
        fallback.textContent = 'Type personnalise: active le mode technique pour editer ce cas.'
        parent.appendChild(fallback)
        refresh()
      }

      function renderConditionFields(parent, condition, commit, refresh) {
        if(condition.type === 'flagEquals') {
          parent.appendChild(createField({
            label: 'Nom du flag',
            element: createControlInput(condition.key, (value) => {
              condition.key = value
              commit()
            }, { placeholder: 'ex: tutorial.termine' })
          }))
          parent.appendChild(createField({
            label: 'Valeur attendue',
            element: createControlInput(condition.value, (value) => {
              condition.value = value
              commit()
            }, { placeholder: 'true / false / texte / nombre', smart: true })
          }))
          return
        }

        if(condition.type === 'flagTruthy') {
          parent.appendChild(createField({
            label: 'Nom du flag',
            element: createControlInput(condition.key, (value) => {
              condition.key = value
              commit()
            }, { placeholder: 'ex: has_key_item' })
          }))
          return
        }

        if(condition.type === 'metierAtLeast' || condition.type === 'metierAtMost') {
          parent.appendChild(createField({
            label: 'Metier',
            element: createControlSelect(METIER_OPTIONS, condition.metier, (value) => {
              condition.metier = value
              commit()
            })
          }))
          parent.appendChild(createField({
            label: 'Valeur cible',
            element: createControlInput(condition.value, (value) => {
              condition.value = Number(value || 0)
              commit()
            }, { placeholder: 'ex: 3', smart: true })
          }))
          return
        }

        if(condition.type === 'contextEquals') {
          parent.appendChild(createField({
            label: 'Cle de contexte',
            element: createControlInput(condition.key, (value) => {
              condition.key = value
              commit()
            }, { placeholder: 'ex: origin' })
          }))
          parent.appendChild(createField({
            label: 'Valeur attendue',
            element: createControlInput(condition.value, (value) => {
              condition.value = value
              commit()
            }, { placeholder: 'ex: hub', smart: true })
          }))
          return
        }

        const fallback = document.createElement('div')
        fallback.className = 'field-help'
        fallback.textContent = 'Condition personnalisee: active le mode technique pour editer ce cas.'
        parent.appendChild(fallback)
        refresh()
      }
